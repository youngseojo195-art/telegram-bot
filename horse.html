<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도파민 카지노 — 경마</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4a843;--gold2:#f0c96a;--gold3:#8b6914;
  --bg:#07080f;--bg2:#0d0e1a;--bg3:#141526;--bg4:#1c1d32;
  --border:#252540;--text:#e8e0cc;--sub:#5a5a7a;
  --green:#44cc88;--red:#ee4444;--blue:#4a9eff;
}
html,body{height:100%;width:100%;overflow-x:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(212,168,67,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* ── 상단 바 ── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,8,15,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 16px 8px;text-align:center;}
.casino-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--gold3);margin-bottom:2px;}
.top-title{font-family:'Cinzel',serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

/* ── 포인트 바 ── */
.point-bar{position:relative;z-index:1;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.point-val{font-size:16px;font-weight:900;color:var(--gold);}

/* ── 상태 배지 ── */
.status-row{position:relative;z-index:1;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.s-idle{background:#14141e;color:var(--sub);border:1px solid var(--border);}
.s-betting{background:#1a1400;color:var(--gold);border:1px solid var(--gold3);}
.s-running{background:#081a10;color:var(--green);border:1px solid #226644;}
.s-closed{background:#160808;color:#ee6666;border:1px solid #662222;}
.s-dot{width:6px;height:6px;border-radius:50%;}
.s-betting .s-dot{background:var(--gold);animation:pulse 1s infinite;}
.s-running .s-dot{background:var(--green);animation:pulse 0.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* ── 메인 스크롤 영역 ── */
.main{position:relative;z-index:1;flex:1;overflow-y:auto;padding:0 12px 140px;display:flex;flex-direction:column;gap:10px;}

/* ══════════════════════════════
   경마 트랙
══════════════════════════════ */
.track-wrap{background:linear-gradient(180deg,#060c04,#081008);border:1px solid #1a3010;border-radius:16px;overflow:hidden;position:relative;}
.track-header{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a3010;}
.track-label{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:2px;}
.track-timer{font-size:11px;color:var(--sub);}

/* 트랙 잔디 배경 */
.track-bg{padding:8px 10px 10px;background:repeating-linear-gradient(180deg,#050c04 0px,#050c04 56px,#060e05 56px,#060e05 57px);}

/* 개별 레인 */
.lane{position:relative;height:52px;margin-bottom:5px;last-child{margin-bottom:0};}
.lane:last-child{margin-bottom:0;}
.lane-grass{position:absolute;inset:2px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.03),transparent);border:1px solid rgba(255,255,255,0.04);}

/* 레인 줄무늬 */
.lane-stripe{position:absolute;inset:2px;border-radius:8px;overflow:hidden;}
.lane-stripe::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 20px,rgba(255,255,255,0.012) 20px,rgba(255,255,255,0.012) 21px);}

/* 결승선 */
.finish{position:absolute;right:2px;top:2px;bottom:2px;width:10px;border-radius:0 8px 8px 0;background:repeating-linear-gradient(180deg,rgba(255,255,255,0.5) 0px,rgba(255,255,255,0.5) 4px,rgba(0,0,0,0.6) 4px,rgba(0,0,0,0.6) 8px);z-index:3;}

/* 번호판 */
.lane-num{position:absolute;left:6px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;z-index:4;}

/* 말 (이모지) */
.racer{position:absolute;top:50%;transform:translateY(-50%);left:32px;font-size:22px;z-index:5;will-change:left;line-height:1;}
.racer.gallop{animation:gallop 0.25s steps(2) infinite;}
@keyframes gallop{0%{transform:translateY(-50%) scaleY(1)}50%{transform:translateY(-54%) scaleY(0.92)}}
.racer.finish-bounce{animation:finishBounce 0.35s ease-in-out infinite;}
@keyframes finishBounce{0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-58%) scale(1.18)}}

/* 말 이름 태그 */
.horse-tag{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;opacity:0.55;z-index:4;white-space:nowrap;}

/* 먼지 파티클 */
.dust{position:absolute;top:50%;width:5px;height:5px;border-radius:50%;opacity:0;pointer-events:none;z-index:6;}

/* ══════════════════════════════
   결과 배너 (인페이지)
══════════════════════════════ */
.result-banner{display:none;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.result-banner.show{display:block;animation:slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.result-header{padding:14px 16px 12px;text-align:center;}
.result-header.win{background:linear-gradient(135deg,#0a1f0a,#081a08);}
.result-header.lose{background:linear-gradient(135deg,#1a0808,#100506);}
.result-header.neutral{background:linear-gradient(135deg,#0a0f1a,#080d14);}

.result-winner-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;}
.result-winner-emoji{font-size:32px;}
.result-winner-name{font-family:'Cinzel',serif;font-size:18px;font-weight:900;}
.result-winner-name.win{background:linear-gradient(135deg,#88ff88,#44cc66);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-winner-name.lose{background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-winner-name.neutral{background:linear-gradient(135deg,#aaaacc,#8888aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.result-sub-label{font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:12px;}

.result-payout-box{background:rgba(0,0,0,0.3);border-radius:10px;padding:10px 14px;margin:0 16px 12px;display:flex;align-items:center;justify-content:space-between;}
.result-payout-label{font-size:11px;color:var(--sub);}
.result-payout-val{font-size:18px;font-weight:900;}
.result-payout-val.win{color:var(--green);}
.result-payout-val.lose{color:var(--red);}

.result-odds-row{display:flex;align-items:center;justify-content:center;gap:16px;padding:0 16px 12px;font-size:11px;color:var(--sub);}
.result-odds-item{text-align:center;}
.result-odds-val{font-size:14px;font-weight:700;color:var(--text);margin-top:2px;}

.result-next-btn{width:calc(100% - 32px);margin:0 16px 14px;padding:12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.result-next-btn:active{opacity:0.7;}

/* 폭죽 파티클 */
.confetti-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:14px;}
.cft{position:absolute;width:6px;height:6px;border-radius:1px;animation:cftFall 1.2s ease-in forwards;}
@keyframes cftFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(80px) rotate(360deg)}}

/* ══════════════════════════════
   베팅 섹션
══════════════════════════════ */
.horse-list{display:flex;flex-direction:column;gap:7px;}
.horse-opt{border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);padding:11px 12px;cursor:pointer;transition:border-color 0.15s,background 0.15s;display:flex;align-items:center;gap:10px;}
.horse-opt:active{transform:scale(0.985);}
.horse-opt.sel{border-width:2px;}
.h-emoji{font-size:26px;width:36px;text-align:center;flex-shrink:0;}
.h-info{flex:1;min-width:0;}
.h-name{font-size:13px;font-weight:800;margin-bottom:2px;}
.h-odds{font-size:11px;color:var(--gold);}
.h-pool{font-size:10px;color:var(--sub);margin-top:1px;}
.h-bar-wrap{flex-shrink:0;width:50px;}
.h-bar-bg{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.h-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.h-pct{font-size:9px;color:var(--sub);margin-top:2px;text-align:right;}

.card-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;}
.card-hd{font-family:'Cinzel',serif;font-size:10px;color:var(--gold3);letter-spacing:2px;margin-bottom:10px;}
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.preset{padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.preset:active{background:var(--bg4);}
.amt-row{display:flex;gap:8px;align-items:center;}
.amt-inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:15px;padding:10px 12px;outline:none;font-family:'Noto Sans KR',sans-serif;}
.amt-inp:focus{border-color:var(--gold3);}
.bet-btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif;transition:opacity 0.15s,transform 0.1s;}
.bet-btn.on{background:linear-gradient(135deg,var(--gold),var(--gold3));color:#0a0800;box-shadow:0 4px 16px rgba(212,168,67,0.25);}
.bet-btn.off{background:var(--bg3);color:#444;cursor:default;}
.bet-btn.on:active{transform:scale(0.98);}

.my-bet-card{background:#0a1018;border:1px solid rgba(74,158,255,0.2);border-radius:12px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}

.idle-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px 20px;text-align:center;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0800;font-size:13px;font-weight:700;padding:10px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.err{background:#cc3333;color:#fff;}
</style>
</head>
<body>

<div class="topbar">
  <div class="casino-label">DOPAMINE CASINO</div>
  <div class="top-title">🐴 HORSE RACING</div>
</div>

<div class="point-bar">
  <span style="font-size:11px;color:var(--sub)">💰 내 포인트</span>
  <span class="point-val" id="my-point">— P</span>
</div>

<div class="status-row">
  <div class="status-badge s-idle" id="status-badge">
    <span class="s-dot"></span>대기 중
  </div>
  <span style="font-size:10px;color:var(--sub)" id="pool-label"></span>
</div>

<div class="main">

  <!-- ══ 경마 트랙 ══ -->
  <div class="track-wrap">
    <div class="track-header">
      <span class="track-label">RACE TRACK</span>
      <span class="track-timer" id="track-info">베팅을 기다리는 중...</span>
    </div>
    <div class="track-bg" id="track-bg"></div>
  </div>

  <!-- ══ 결과 배너 (인페이지) ══ -->
  <div class="result-banner" id="result-banner">
    <div class="result-header neutral" id="result-header">
      <div class="result-winner-row">
        <span class="result-winner-emoji" id="res-emoji">🏆</span>
        <span class="result-winner-name neutral" id="res-name">—</span>
      </div>
      <div class="result-sub-label" id="res-label">우승마</div>
    </div>
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <div class="result-payout-box" id="res-payout-box">
      <span class="result-payout-label" id="res-payout-label">결과</span>
      <span class="result-payout-val neutral" id="res-payout-val">—</span>
    </div>
    <div class="result-odds-row" id="res-odds-row"></div>
    <button class="result-next-btn" onclick="closeResult()">다음 경주 기다리기 →</button>
  </div>

  <!-- ══ 내 베팅 표시 ══ -->
  <div class="my-bet-card" id="my-bet-card" style="display:none">
    <div>
      <div style="font-size:10px;color:var(--sub);margin-bottom:3px">내 베팅</div>
      <div style="font-size:13px;font-weight:700" id="my-bet-detail">—</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--sub);margin-bottom:3px">예상 당첨</div>
      <div style="font-size:14px;font-weight:700;color:var(--gold)" id="my-bet-exp">—</div>
    </div>
  </div>

  <!-- ══ 베팅 섹션 ══ -->
  <div id="bet-section" style="display:none">
    <div class="card-box">
      <div class="card-hd">— 출전마 선택 —</div>
      <div class="horse-list" id="horse-opts"></div>
    </div>
    <div class="card-box" style="margin-top:8px">
      <div class="card-hd">— 베팅 금액 —</div>
      <div class="presets">
        <button class="preset" onclick="setAmt(100)">100</button>
        <button class="preset" onclick="setAmt(500)">500</button>
        <button class="preset" onclick="setAmt(1000)">1K</button>
        <button class="preset" onclick="setMax()">MAX</button>
      </div>
      <div class="amt-row">
        <input class="amt-inp" type="number" id="amt" placeholder="베팅 금액" min="10" oninput="refreshBtn()">
        <span style="font-size:12px;color:var(--sub)">P</span>
      </div>
      <button class="bet-btn off" id="bet-btn" onclick="doBet()">말을 선택해주세요</button>
    </div>
  </div>

  <!-- ══ 대기/종료 메시지 ══ -->
  <div class="idle-box" id="idle-box">
    <div style="font-size:40px;margin-bottom:8px">🐴</div>
    <div style="font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:5px" id="idle-title">경마 대기 중</div>
    <div style="font-size:12px;color:var(--sub);line-height:1.7" id="idle-sub">관리자가 베팅을 오픈하면<br>이 화면에서 바로 베팅할 수 있어요</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const p = new URLSearchParams(location.search);
const userId  = p.get('userId')  || p.get('start')?.split('_')[0];
const groupId = p.get('groupId') || p.get('start')?.split('_')[1];

let state = null, picked = null, myPt = 0, prevSt = null;
let rafId = null, racing = false, raceStartTime = null;
let horseProgress = {};   // 0~100
let resultShown = false;

const COLORS = ['#4a9eff','#ff6644','#44cc88','#cc88ff','#ffd700'];
const DEFAULT_HORSES = [
  {id:1,name:'번개',emoji:'⚡',win_rate:30,base_odds:2.5},
  {id:2,name:'폭풍',emoji:'🌪️',win_rate:20,base_odds:3.5},
  {id:3,name:'황금',emoji:'⭐',win_rate:15,base_odds:5.0},
  {id:4,name:'다이아',emoji:'💎',win_rate:10,base_odds:7.0},
  {id:5,name:'불꽃',emoji:'🔥',win_rate:25,base_odds:3.0},
];

// ── 유틸 ──
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' err':'');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.className='toast', 2600);
}
function fmt(n){return Number(n||0).toLocaleString();}
function horses(){return state?.settings?.horses||DEFAULT_HORSES;}

// ══════════════════════════════════════
// 트랙 DOM 빌드
// ══════════════════════════════════════
function buildTrack(hs) {
  const bg = document.getElementById('track-bg');
  bg.innerHTML = hs.map((h,i)=>`
    <div class="lane" id="lane-${h.id}">
      <div class="lane-grass"></div>
      <div class="lane-stripe"></div>
      <div class="finish"></div>
      <div class="lane-num" id="num-${h.id}" style="background:${COLORS[i]}22;color:${COLORS[i]};border:1px solid ${COLORS[i]}55">${h.id}</div>
      <div class="racer" id="racer-${h.id}">${h.emoji}</div>
      <div class="horse-tag" style="color:${COLORS[i]}">${h.name}</div>
    </div>
  `).join('');
  hs.forEach(h => { horseProgress[h.id] = 0; });
}

function getRacerX(laneEl, pct) {
  const w = laneEl.offsetWidth || 320;
  const maxX = w - 46;
  return 32 + Math.max(0, Math.min(1, pct/100)) * (maxX - 32);
}

function setRacerX(hid, pct) {
  const lane = document.getElementById('lane-'+hid);
  const racer = document.getElementById('racer-'+hid);
  if (!lane || !racer) return;
  racer.style.left = getRacerX(lane, pct) + 'px';
}

function resetRacers() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  racing = false;
  horses().forEach(h => {
    horseProgress[h.id] = 0;
    setRacerX(h.id, 0);
    const r = document.getElementById('racer-'+h.id);
    if (r) { r.classList.remove('gallop','finish-bounce'); }
  });
}

// ══════════════════════════════════════
// 달리기 애니메이션
// ══════════════════════════════════════
function startRaceAnim(winnerId, onDone) {
  if (rafId) cancelAnimationFrame(rafId);
  racing = true;
  raceStartTime = performance.now();

  // 각 말의 "목표 속도 프로파일" 설정
  // 우승마는 항상 95~97에서 결승
  // 나머지는 랜덤하게 뒤처짐
  const hs = horses();
  const profiles = {};
  hs.forEach(h => {
    const isWinner = String(h.id) === String(winnerId);
    profiles[h.id] = {
      isWinner,
      speed: isWinner ? 1.0 : (0.45 + Math.random() * 0.45),
      jitter: (Math.random() - 0.5) * 0.3,
      burst: Math.random() * 0.2,  // 갑자기 튀어나오는 구간
      burstAt: 20 + Math.random() * 40,
    };
    horseProgress[h.id] = 0;
    const r = document.getElementById('racer-'+h.id);
    if (r) r.classList.add('gallop');
  });

  const DURATION = 4500; // ms

  function tick(now) {
    const elapsed = now - raceStartTime;
    const t = Math.min(1, elapsed / DURATION);

    let allDone = true;
    hs.forEach(h => {
      const pr = profiles[h.id];
      // easing: slow start, fast middle, slow end for winner
      let ease;
      if (pr.isWinner) {
        ease = t < 0.5
          ? 2 * t * t
          : 1 - Math.pow(-2*t+2, 2)/2;
      } else {
        ease = t;
      }
      const target = pr.isWinner
        ? ease * 96
        : ease * (55 + pr.speed * 35) + (t > pr.burstAt/100 ? pr.burst*10 : 0);

      // 부드러운 추적 + 미세 떨림
      const jitter = (Math.random()-0.5) * 1.5;
      horseProgress[h.id] += (target - horseProgress[h.id]) * 0.07 + jitter;
      horseProgress[h.id] = Math.max(0, Math.min(pr.isWinner ? 96 : 80, horseProgress[h.id]));
      setRacerX(h.id, horseProgress[h.id]);
      if (t < 1) allDone = false;
    });

    if (!allDone) {
      rafId = requestAnimationFrame(tick);
    } else {
      // 완주 처리
      hs.forEach(h => {
        const r = document.getElementById('racer-'+h.id);
        if (!r) return;
        r.classList.remove('gallop');
        if (String(h.id) === String(winnerId)) {
          horseProgress[h.id] = 96;
          setRacerX(h.id, 96);
          r.classList.add('finish-bounce');
        }
      });
      racing = false;
      rafId = null;
      setTimeout(() => { if (onDone) onDone(); }, 500);
    }
  }
  rafId = requestAnimationFrame(tick);
}

// ══════════════════════════════════════
// 결과 배너 표시
// ══════════════════════════════════════
function showResultBanner(s) {
  if (resultShown) return;
  resultShown = true;

  const hs = horses();
  const winner = s.result;
  const winH = hs.find(h => String(h.id)===String(winner) || h.name===winner) || hs[0];
  const winIdx = hs.indexOf(winH);
  const winColor = COLORS[winIdx] || '#ffd700';

  const myBetOn = s.myBet?.betOn;
  const won = myBetOn && String(myBetOn)===String(winner);
  const betAmount = s.myBet?.amount || 0;
  const odds = winH?.base_odds || 2.5;
  const payout = won ? Math.floor(betAmount * odds) : 0;
  const nobet = !myBetOn;

  // 헤더 스타일
  const hdr = document.getElementById('result-header');
  hdr.className = 'result-header ' + (nobet?'neutral':won?'win':'lose');

  // 이모지
  document.getElementById('res-emoji').textContent = winH.emoji;

  // 이름
  const nameEl = document.getElementById('res-name');
  nameEl.textContent = winH.name + ' 우승!';
  nameEl.className = 'result-winner-name ' + (nobet?'neutral':won?'win':'lose');

  // 서브 라벨
  document.getElementById('res-label').textContent =
    nobet ? '이번 라운드 베팅 없음' : won ? '🎉 베팅 성공!' : '😢 아쉬워요';

  // 배당 박스
  const payoutBox = document.getElementById('res-payout-box');
  const payoutLabel = document.getElementById('res-payout-label');
  const payoutVal = document.getElementById('res-payout-val');
  if (nobet) {
    payoutBox.style.display = 'none';
  } else {
    payoutBox.style.display = 'flex';
    payoutLabel.textContent = won ? '획득 포인트' : '잃은 포인트';
    payoutVal.textContent = won ? `+${fmt(payout)} P` : `-${fmt(betAmount)} P`;
    payoutVal.className = 'result-payout-val ' + (won?'win':'lose');
    if (won) { myPt += payout; document.getElementById('my-point').textContent = fmt(myPt)+' P'; }
  }

  // 배당 정보 행
  const oddsRow = document.getElementById('res-odds-row');
  oddsRow.innerHTML = `
    <div class="result-odds-item">
      <div>배당률</div>
      <div class="result-odds-val" style="color:${winColor}">x${odds.toFixed(2)}</div>
    </div>
    <div style="width:1px;height:28px;background:var(--border)"></div>
    <div class="result-odds-item">
      <div>총 베팅</div>
      <div class="result-odds-val">${fmt(Object.values(s.bets||{}).reduce((a,b)=>a+(b.total||0),0))}P</div>
    </div>
    <div style="width:1px;height:28px;background:var(--border)"></div>
    <div class="result-odds-item">
      <div>참여자</div>
      <div class="result-odds-val">${Object.values(s.bets||{}).reduce((a,b)=>a+(b.count||0),0)}명</div>
    </div>
  `;

  // 폭죽 (당첨시)
  if (won) spawnConfetti();

  // 배너 표시
  const banner = document.getElementById('result-banner');
  banner.classList.add('show');
  // 스크롤
  setTimeout(()=>banner.scrollIntoView({behavior:'smooth',block:'nearest'}), 100);
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#ffd700','#44cc88','#4a9eff','#ff6644','#cc88ff','#ff88aa'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'cft';
    el.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*30}%;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;animation-duration:${0.8+Math.random()*0.6}s;transform:rotate(${Math.random()*360}deg)`;
    wrap.appendChild(el);
  }
}

function closeResult() {
  document.getElementById('result-banner').classList.remove('show');
  resultShown = false;
  load();
}

// ══════════════════════════════════════
// 말 선택 옵션 렌더
// ══════════════════════════════════════
function buildHorseOpts(hs, bets) {
  const totalPool = Object.values(bets||{}).reduce((a,b)=>a+(b.total||0),0);
  document.getElementById('horse-opts').innerHTML = hs.map((h,i)=>{
    const pool = bets?.[h.id]?.total || bets?.[String(h.id)]?.total || 0;
    const cnt  = bets?.[h.id]?.count || bets?.[String(h.id)]?.count || 0;
    const pct  = totalPool>0 ? Math.round(pool/totalPool*100) : 0;
    const odds = h.base_odds||2.5;
    return `<div class="horse-opt" id="hopt-${h.id}" onclick="pick(${h.id})" style="border-color:${COLORS[i]}33">
      <div class="h-emoji">${h.emoji}</div>
      <div class="h-info">
        <div class="h-name" style="color:${COLORS[i]}">${h.name}</div>
        <div class="h-odds">배당 x${odds.toFixed(2)}</div>
        <div class="h-pool">${fmt(pool)}P · ${cnt}명</div>
      </div>
      <div class="h-bar-wrap">
        <div class="h-bar-bg"><div class="h-bar-fill" style="width:${pct}%;background:${COLORS[i]}"></div></div>
        <div class="h-pct">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

function pick(id) {
  picked = id;
  const hs = horses();
  document.querySelectorAll('.horse-opt').forEach(el=>el.classList.remove('sel'));
  const opt = document.getElementById('hopt-'+id);
  if (opt) {
    const idx = hs.findIndex(h=>h.id===id);
    opt.classList.add('sel');
    opt.style.borderColor = COLORS[idx]||'var(--gold)';
    opt.style.background  = (COLORS[idx]||'var(--gold)') + '11';
  }
  refreshBtn();
}

function setAmt(v){document.getElementById('amt').value=v; refreshBtn();}
function setMax(){setAmt(Math.min(myPt, state?.settings?.max_bet||10000));}

function refreshBtn() {
  const btn = document.getElementById('bet-btn');
  const amt = parseInt(document.getElementById('amt').value)||0;
  const minB = state?.settings?.min_bet||10;
  if (!picked) { btn.className='bet-btn off'; btn.textContent='말을 선택해주세요'; return; }
  if (amt < minB) { btn.className='bet-btn off'; btn.textContent=`최소 ${fmt(minB)}P 이상`; return; }
  if (amt > myPt)  { btn.className='bet-btn off'; btn.textContent='포인트 부족'; return; }
  const h = horses().find(hh=>hh.id===picked);
  const odds = h?.base_odds||2.5;
  btn.className='bet-btn on';
  btn.textContent=`${h?.emoji||'🐎'} ${h?.name||picked} · ${fmt(amt)}P → 예상 +${fmt(Math.floor(amt*odds))}P`;
}

// ══════════════════════════════════════
// 화면 전체 렌더
// ══════════════════════════════════════
function render(s) {
  state = s;
  const hs = horses();

  // 레인 없으면 빌드
  if (!document.getElementById('lane-'+hs[0].id)) buildTrack(hs);

  // 상태 배지
  const statusMap = {
    idle:    ['s-idle',   '⏳ 대기 중'],
    betting: ['s-betting','🔴 베팅 진행 중'],
    running: ['s-running','🏇 경주 진행 중'],
    closed:  ['s-closed', '🏁 경주 종료'],
  };
  const [cls, lbl] = statusMap[s.status]||statusMap.idle;
  const badge = document.getElementById('status-badge');
  badge.className = 'status-badge '+cls;
  badge.innerHTML = `<span class="s-dot"></span>${lbl}`;

  // 총 베팅 풀
  const totalPool = Object.values(s.bets||{}).reduce((a,b)=>a+(b.total||0),0);
  document.getElementById('pool-label').textContent = totalPool>0 ? `총 ${fmt(totalPool)}P 베팅 중` : '';

  // 트랙 정보
  const trackInfo = {
    idle:'베팅을 기다리는 중...', betting:'베팅 오픈! 말을 선택하세요',
    running:'경주 중 🏇', closed:'경주 종료'
  };
  document.getElementById('track-info').textContent = trackInfo[s.status]||'';

  // 섹션 표시/숨김
  const betSec    = document.getElementById('bet-section');
  const myBetCard = document.getElementById('my-bet-card');
  const idleBox   = document.getElementById('idle-box');
  betSec.style.display = 'none';
  myBetCard.style.display = 'none';
  idleBox.style.display = 'none';

  if (s.status === 'betting') {
    if (s.myBet) {
      const h = hs.find(hh=>String(hh.id)===String(s.myBet.betOn));
      const odds = h?.base_odds||2.5;
      document.getElementById('my-bet-detail').textContent = `${h?.emoji||'🐎'} ${h?.name||s.myBet.betOn} · ${fmt(s.myBet.amount)}P`;
      document.getElementById('my-bet-exp').textContent = `+${fmt(Math.floor(s.myBet.amount*odds))}P`;
      myBetCard.style.display = 'flex';
    } else {
      buildHorseOpts(hs, s.bets||{});
      betSec.style.display = 'block';
    }
    resetRacers();
  } else if (s.status === 'running') {
    if (s.myBet) {
      const h = hs.find(hh=>String(hh.id)===String(s.myBet.betOn));
      const odds = h?.base_odds||2.5;
      document.getElementById('my-bet-detail').textContent = `${h?.emoji||'🐎'} ${h?.name||s.myBet.betOn} · ${fmt(s.myBet.amount)}P`;
      document.getElementById('my-bet-exp').textContent = `+${fmt(Math.floor(s.myBet.amount*odds))}P`;
      myBetCard.style.display = 'flex';
    } else {
      idleBox.style.display = 'block';
      document.getElementById('idle-title').textContent = '경주 진행 중';
      document.getElementById('idle-sub').textContent = '잠시 후 결과가 여기에 표시돼요';
    }
  } else {
    // idle / closed
    idleBox.style.display = 'block';
    document.getElementById('idle-title').textContent = s.status==='closed' ? '경주 종료' : '경마 대기 중';
    document.getElementById('idle-sub').textContent   = s.status==='closed' ? '다음 경주를 기다려주세요' : '관리자가 베팅을 오픈하면\n이 화면에서 바로 베팅할 수 있어요';
    if (s.status !== 'closed') resetRacers();
  }

  refreshBtn();
}

// ══════════════════════════════════════
// API
// ══════════════════════════════════════
async function doBet() {
  if (!picked || !state) return;
  const amt = parseInt(document.getElementById('amt').value)||0;
  if (amt < (state.settings?.min_bet||10) || amt > myPt) return;
  const btn = document.getElementById('bet-btn');
  btn.className='bet-btn off'; btn.textContent='⏳ 처리 중...';
  try {
    const res = await fetch('/casino/horse/bet', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({roundId:state.roundId, groupId:parseInt(groupId), userId:parseInt(userId), betOn:picked, amount:amt})
    });
    const data = await res.json();
    if (data.ok) { toast('✅ 베팅 완료!'); myPt -= amt; document.getElementById('my-point').textContent=fmt(myPt)+' P'; await load(); }
    else { toast(data.error||'오류', true); refreshBtn(); }
  } catch(e) { toast('서버 오류', true); refreshBtn(); }
}

let pollId = null;

async function load() {
  try {
    const res = await fetch(`/casino/horse/state?groupId=${groupId}&userId=${userId}`);
    const data = await res.json();
    if (data.error) return;

    const newSt = data.status;

    // running → closed 전환 시 애니메이션 + 결과 표시
    if (prevSt === 'running' && newSt === 'closed' && data.result && !racing && !resultShown) {
      render(data); // 트랙은 먼저 그려두고
      startRaceAnim(data.result, () => showResultBanner(data));
    } else if (newSt === 'closed' && data.result && !resultShown && prevSt === 'closed') {
      // 이미 closed인데 결과 배너 없으면 그냥 표시
      render(data);
    } else {
      render(data);
    }
    prevSt = newSt;
  } catch(e) {}
}

async function loadPt() {
  try {
    const res = await fetch(`/casino/users?groupId=${groupId}`);
    const users = await res.json();
    const me = users.find(u=>String(u.userId)===String(userId));
    if (me) { myPt = me.point; document.getElementById('my-point').textContent = fmt(myPt)+' P'; }
  } catch(e) {}
}

async function init() {
  await loadPt();
  await load();
  setInterval(load, 3000);
}
init();
</script>
