<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도파민 카지노 — 경마</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4a843;--gold2:#f0c96a;--gold3:#8b6914;
  --bg:#080810;--bg2:#0e0e1c;--bg3:#161628;--bg4:#1e1e35;
  --border:#2a2a45;--text:#e8e0cc;--sub:#6a6a8a;
}
html,body{height:100%;width:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.topbar{background:linear-gradient(180deg,#0e0e1e,#080810);border-bottom:1px solid var(--border);padding:12px 16px 10px;text-align:center;position:sticky;top:0;z-index:50;}
.casino-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--gold3);margin-bottom:3px;}
.top-title{font-family:'Cinzel',serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.point-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.point-val{font-size:16px;font-weight:700;color:var(--gold);}
.main{flex:1;overflow-y:auto;padding:14px 14px 100px;display:flex;flex-direction:column;gap:12px;}

.horse-track{background:linear-gradient(180deg,#060e04,#081006);border:1px solid #1a3a12;border-radius:14px;padding:12px;}
.track-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:10px;}
.horse-lane{position:relative;height:50px;border-radius:8px;background:linear-gradient(90deg,#060e04,#081206);border:1px solid rgba(255,255,255,0.05);margin-bottom:6px;overflow:hidden;}
.horse-lane:last-child{margin-bottom:0;}
.horse-lane::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(255,255,255,0.015) 30px,rgba(255,255,255,0.015) 31px);}
.lane-num{position:absolute;left:6px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;z-index:2;}
.finish-line{position:absolute;right:0;top:0;bottom:0;width:12px;background:repeating-linear-gradient(180deg,#fff 0px,#fff 6px,#000 6px,#000 12px);opacity:0.4;}
.horse-racer{position:absolute;top:50%;left:0;font-size:20px;z-index:3;transform:translateY(-50%) translateX(0px);will-change:transform;}
.horse-racer.winner-pulse{animation:wp 0.4s ease-in-out infinite;}
@keyframes wp{0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.15)}}
.horse-name-tag{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;opacity:0.6;z-index:2;}

.horse-grid{display:flex;flex-direction:column;gap:7px;}
.horse-opt{border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);padding:11px 14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:12px;}
.horse-opt:active{transform:scale(0.98);}
.horse-opt.selected{border-width:2px;}
.horse-emoji{font-size:26px;width:36px;text-align:center;}
.horse-info{flex:1;}
.horse-opt-name{font-size:13px;font-weight:800;}
.horse-opt-odds{font-size:12px;color:var(--gold);}
.horse-opt-prob{font-size:10px;color:var(--sub);margin-top:1px;}

.card-inner{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.card-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;}
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.preset{padding:9px 4px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.preset:active{background:var(--bg4);}
.amt-row{display:flex;gap:8px;align-items:center;}
.amt-inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:11px 14px;outline:none;}
.amt-inp:focus{border-color:var(--gold3);}
.bet-btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,var(--gold),var(--gold3));color:#0a0800;margin-top:10px;}
.bet-btn.off{background:var(--border);color:#333;cursor:default;}
.bet-btn:not(.off):active{transform:scale(0.98);}

.history-dots{display:flex;flex-wrap:wrap;gap:5px;}
.hdot{padding:3px 7px;border-radius:6px;font-size:10px;font-weight:700;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;}
.overlay.show{display:flex;}
.ov-emoji{font-size:64px;animation:pop 0.4s ease-out;}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.ov-title{font-family:'Cinzel',serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ov-sub{font-size:13px;color:var(--sub);line-height:1.7;}
.ov-payout{font-size:28px;font-weight:900;}
.ov-close{padding:13px 30px;border-radius:12px;border:1px solid var(--gold3);background:transparent;color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;}

.home-btn{position:fixed;bottom:20px;left:16px;z-index:100;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--sub);font-size:12px;cursor:pointer;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0800;font-size:13px;font-weight:700;padding:10px 20px;border-radius:20px;z-index:500;opacity:0;transition:opacity 0.2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.toast.err{background:#cc3333;color:#fff;}
</style>
</head>
<body>
<div class="topbar">
  <div class="casino-label">DOPAMINE CASINO</div>
  <div class="top-title">🐴 HORSE RACING</div>
</div>
<div class="point-bar">
  <span style="font-size:11px;color:var(--sub)">💰 내 포인트</span>
  <span class="point-val" id="my-point">— P</span>
</div>

<div class="main">
  <div class="horse-track">
    <div class="track-title">RACE TRACK</div>
    <div id="horse-lanes"></div>
  </div>

  <div class="card-inner">
    <div class="card-title">— 출전마 선택 —</div>
    <div class="horse-grid" id="horse-opts"></div>
    <div style="height:10px"></div>
    <div class="presets">
      <button class="preset" onclick="setAmt(100)">100</button>
      <button class="preset" onclick="setAmt(500)">500</button>
      <button class="preset" onclick="setAmt(1000)">1,000</button>
      <button class="preset" onclick="setMax()">MAX</button>
    </div>
    <div class="amt-row">
      <input class="amt-inp" type="number" id="amt" placeholder="베팅 금액" min="10" oninput="refreshBtn()"/>
      <span style="font-size:13px;color:var(--sub)">P</span>
    </div>
    <button class="bet-btn off" id="bet-btn" onclick="startRace()">말을 선택해주세요</button>
  </div>

  <div class="card-inner">
    <div class="card-title">HISTORY</div>
    <div class="history-dots" id="history-dots">
      <div style="font-size:11px;color:var(--sub)">기록 없음</div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-emoji" id="ov-emoji">🏆</div>
  <div class="ov-title" id="ov-title"></div>
  <div class="ov-sub" id="ov-sub"></div>
  <div class="ov-payout" id="ov-payout"></div>
  <button class="ov-close" onclick="closeOverlay()">다시 베팅</button>
</div>
<div class="toast" id="toast"></div>
<button class="home-btn" onclick="goHome()">🏠 홈</button>

<script>

// ── INLINE CORE ──
function getParam(key) {
  const sp = new URLSearchParams(location.search);
  if (sp.get(key)) return sp.get(key);
  const hp = new URLSearchParams(location.hash.replace(/^#/,''));
  if (hp.get(key)) return hp.get(key);
  const start = sp.get('tgWebAppStartParam')||hp.get('tgWebAppStartParam')||sp.get('start')||hp.get('start')||'';
  if (start) {
    const parts = start.split('_');
    if (key==='userId'  && parts[0]) return parts[0];
    if (key==='groupId' && parts[1]) return parts[1];
  }
  return null;
}
function _ptKey(g,u){return 'casino_pt_'+g+'_'+u;}
function getPoint(g,u){const v=localStorage.getItem(_ptKey(g,u));return v!==null?parseInt(v):5000;}
function setPoint(g,u,pt){localStorage.setItem(_ptKey(g,u),Math.max(0,Math.floor(pt)));}
function addPoint(g,u,delta){const n=Math.max(0,getPoint(g,u)+Math.floor(delta));setPoint(g,u,n);return n;}
function fmt(n){return Number(n||0).toLocaleString();}
function goHome(uid,gid){location.href='/casino?userId='+uid+'&groupId='+gid;}
function weightedRandom(weights){
  const total=weights.reduce((a,b)=>a+b.weight,0);
  let r=Math.random()*total;
  for(const w of weights){r-=w.weight;if(r<=0)return w.id;}
  return weights[weights.length-1].id;
}

const userId  = getParam('userId');
const groupId = getParam('groupId');
let myPt = getPoint(groupId, userId);
let picked = null, racing = false, raceAnim = null;
let history = [];

const HORSES = [
  {id:1, name:'번개',  emoji:'⚡', weight:30, odds:2.2, color:'#4a9eff'},
  {id:2, name:'폭풍',  emoji:'🌪️', weight:22, odds:3.0, color:'#88cc55'},
  {id:3, name:'황금',  emoji:'⭐', weight:16, odds:4.0, color:'#ffd700'},
  {id:4, name:'다이아',emoji:'💎', weight:10, odds:7.0, color:'#cc88ff'},
  {id:5, name:'불꽃',  emoji:'🔥', weight:22, odds:3.0, color:'#ff6644'},
];
const H_COLORS = HORSES.map(h => h.color);
let horsePos = {};

document.getElementById('my-point').textContent = fmt(myPt) + ' P';

function buildLanes() {
  const el = document.getElementById('horse-lanes');
  el.innerHTML = HORSES.map((h, i) => `
    <div class="horse-lane" id="lane-${h.id}">
      <div class="lane-num" style="background:${h.color}33;color:${h.color};border:1px solid ${h.color}66">${h.id}</div>
      <div class="horse-racer" id="racer-${h.id}">${h.emoji}</div>
      <div class="horse-name-tag" style="color:${h.color}">${h.name}</div>
      <div class="finish-line"></div>
    </div>`).join('');
  HORSES.forEach(h => { horsePos[h.id] = 0; });
}

function setHorsePos(id, pct) {
  const el = document.getElementById('racer-' + id);
  if (!el) return;
  const lane = document.getElementById('lane-' + id);
  const laneW = (lane?.offsetWidth || 300) - 48;
  const px = Math.min(laneW, Math.max(0, pct / 100 * laneW));
  el.style.transform = `translateY(-50%) translateX(${px}px)`;
}

function resetHorses() {
  HORSES.forEach(h => { horsePos[h.id] = 0; setHorsePos(h.id, 0); });
  document.querySelectorAll('.horse-racer').forEach(el => el.classList.remove('winner-pulse'));
}

function buildOpts() {
  const el = document.getElementById('horse-opts');
  el.innerHTML = HORSES.map(h => `
    <div class="horse-opt" id="hopt-${h.id}" onclick="pick(${h.id})" style="border-color:${h.color}44">
      <div style="width:24px;height:24px;border-radius:50%;background:${h.color}33;border:1.5px solid ${h.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:${h.color};flex-shrink:0">${h.id}</div>
      <div class="horse-emoji">${h.emoji}</div>
      <div class="horse-info">
        <div class="horse-opt-name" style="color:${h.color}">${h.id}번 ${h.name}</div>
        <div class="horse-opt-odds">배당 x${h.odds.toFixed(1)}</div>
        <div class="horse-opt-prob">승률 약 ${Math.round(h.weight / HORSES.reduce((a,b)=>a+b.weight,0) * 100)}%</div>
      </div>
    </div>`).join('');
}

function pick(id) {
  picked = id;
  HORSES.forEach(h => {
    const opt = document.getElementById('hopt-' + h.id);
    if (!opt) return;
    if (h.id === id) {
      opt.classList.add('selected');
      opt.style.borderColor = h.color;
      opt.style.background  = h.color + '18';
    } else {
      opt.classList.remove('selected');
      opt.style.borderColor = h.color + '44';
      opt.style.background  = '';
    }
  });
  refreshBtn();
}

function setAmt(v) { document.getElementById('amt').value = v; refreshBtn(); }
function setMax() { setAmt(Math.min(myPt, 10000)); }

function refreshBtn() {
  const btn = document.getElementById('bet-btn');
  const amt = parseInt(document.getElementById('amt').value) || 0;
  if (racing) { btn.className = 'bet-btn off'; btn.textContent = '🏇 경마 중...'; return; }
  if (!picked) { btn.className = 'bet-btn off'; btn.textContent = '말을 선택해주세요'; return; }
  if (amt < 10) { btn.className = 'bet-btn off'; btn.textContent = '최소 10P 이상'; return; }
  if (amt > myPt) { btn.className = 'bet-btn off'; btn.textContent = '포인트 부족'; return; }
  const h = HORSES.find(hh => hh.id === picked);
  btn.className = 'bet-btn';
  btn.textContent = `${h.emoji} ${h.name} · ${fmt(amt)}P → 예상 +${fmt(Math.floor(amt * h.odds))}P`;
}

function animHorses(winnerId, onDone) {
  if (raceAnim) cancelAnimationFrame(raceAnim);
  racing = true;
  HORSES.forEach(h => { horsePos[h.id] = 0; setHorsePos(h.id, 0); });

  const startTime = performance.now();
  const duration  = 4500 + Math.random() * 800;

  // 미리 고정된 랜덤값 (매 프레임 Math.random 금지)
  const spurts   = {};
  const loseTgts = {};
  HORSES.forEach(h => {
    spurts[h.id]   = 0.25 + Math.random() * 0.35;
    loseTgts[h.id] = 55 + Math.random() * 18;
  });

  function calcPos(t, isWinner, spurtAt, loseMax) {
    const tgt = isWinner ? 96 : loseMax;
    let base = 1 - Math.pow(1 - t, 2.4);
    if (t > spurtAt && t < spurtAt + 0.18) {
      const st = (t - spurtAt) / 0.18;
      base += Math.sin(st * Math.PI) * 0.09;
    }
    return Math.min(1, Math.max(0, base)) * tgt;
  }

  // 각 말의 진행 속도 비율 (패자는 0.80~0.88 사이)
  const speedMult = {};
  HORSES.forEach(h => {
    speedMult[h.id] = h.id === winnerId ? 1.0 : 0.80 + Math.random() * 0.08;
  });

  function tick(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    HORSES.forEach(h => {
      const isWin = h.id === winnerId;
      const ht = Math.min(t * speedMult[h.id], 1);
      horsePos[h.id] = calcPos(ht, isWin, spurts[h.id], loseTgts[h.id]);

      // 바운스 (각 말마다 위상 다르게)
      const bounce = Math.sin(now * 0.022 + h.id * 1.2) * 3;
      const lane = document.getElementById('lane-' + h.id);
      const laneW = (lane?.offsetWidth || 300) - 48;
      const px = Math.min(laneW, Math.max(0, horsePos[h.id] / 100 * laneW));
      const el = document.getElementById('racer-' + h.id);
      if (el) el.style.transform = `translateY(calc(-50% + ${bounce}px)) translateX(${px}px)`;
    });

    if (t < 1) {
      raceAnim = requestAnimationFrame(tick);
    } else {
      racing = false;
      HORSES.forEach(h => {
        setHorsePos(h.id, horsePos[h.id]);
        if (h.id === winnerId) document.getElementById('racer-' + h.id)?.classList.add('winner-pulse');
      });
      if (onDone) setTimeout(onDone, 700);
    }
  }
  requestAnimationFrame(tick);
}

async function startRace() {
  if (racing || !picked) return;
  const amt = parseInt(document.getElementById('amt').value) || 0;
  if (amt < 10 || amt > myPt) return;

  document.querySelector('.card-inner').style.opacity = '0.4';
  document.querySelector('.card-inner').style.pointerEvents = 'none';
  refreshBtn();

  try {
    const res = await fetch('/casino/horse/instant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({groupId:parseInt(groupId), userId:parseInt(userId), betOn:picked, amount:amt})
    });
    const data = await res.json();
    if (!data.ok) {
      toast(data.error||'오류', true);
      document.querySelector('.card-inner').style.opacity = '1';
      document.querySelector('.card-inner').style.pointerEvents = '';
      refreshBtn(); return;
    }

    const winnerId = data.winnerId;  // 서버가 결정한 우승마 id
    const payout   = data.payout;   // 서버가 계산한 지급액

    // 포인트 서버 기준 동기화
    myPt = myPt - amt + (payout||0);
    setPoint(groupId, userId, myPt);
    document.getElementById('my-point').textContent = fmt(myPt) + ' P';

    animHorses(winnerId, () => {
      const winH = HORSES.find(h => h.id === winnerId);
      const betH = HORSES.find(h => h.id === picked);
      const won  = winnerId === picked;

      history.unshift({ id: winH.id, name: winH.name, emoji: winH.emoji, color: winH.color });
      if (history.length > 15) history.pop();
      renderHistory();

      document.getElementById('ov-emoji').textContent = won ? '🏆' : '💸';
      document.getElementById('ov-title').textContent = `${winH.emoji} ${winH.name} 우승!`;
      if (won) {
        document.getElementById('ov-sub').textContent = '🎉 베팅 성공!';
        document.getElementById('ov-payout').textContent = `+${fmt(payout)} P 획득!`;
        document.getElementById('ov-payout').style.color = '#44ee88';
        vibrate([100,50,200]);
      } else {
        document.getElementById('ov-sub').textContent = `아쉬워요. ${betH.emoji} ${betH.name}은 탈락!`;
        document.getElementById('ov-payout').textContent = `-${fmt(amt)} P`;
        document.getElementById('ov-payout').style.color = '#ee4444';
        vibrate([200]);
      }
      document.getElementById('overlay').classList.add('show');
    });
  } catch(e) {
    toast('서버 오류', true);
    document.querySelector('.card-inner').style.opacity = '1';
    document.querySelector('.card-inner').style.pointerEvents = '';
    refreshBtn();
  }
}

function renderHistory() {
  const el = document.getElementById('history-dots');
  if (!history.length) { el.innerHTML = '<div style="font-size:11px;color:var(--sub)">기록 없음</div>'; return; }
  el.innerHTML = history.map(h =>
    `<div class="hdot" style="background:${h.color}22;border:1px solid ${h.color}66;color:${h.color}">${h.emoji} ${h.name}</div>`
  ).join('');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.querySelector('.card-inner').style.opacity = '1';
  document.querySelector('.card-inner').style.pointerEvents = '';
  resetHorses();
  picked = null;
  buildOpts();
  document.getElementById('amt').value = '';
  refreshBtn();
}

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }
function goHome() { goHome(userId, groupId); }

buildLanes();
buildOpts();
</script>
</body>
</html>
