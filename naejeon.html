<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내전 모집</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: #12122a;
  padding: 14px 16px 10px;
  text-align: center;
  border-bottom: 1px solid #1e1e3a;
  flex-shrink: 0;
}
.top-title { font-size: 16px; font-weight: 700; color: #fff; }
.top-sub   { font-size: 11px; color: #8888bb; margin-top: 3px; }

.content {
  flex: 1;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 90px;
  overflow-y: auto;
}

.status-bar {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.st-label { color: #8888bb; font-size: 12px; }
.st-val   { color: #4a9eff; font-size: 14px; font-weight: 700; }
.st-full  { color: #1d9e75; }

/* 관리자 배너 */
.admin-banner {
  background: #1a1030;
  border: 1px solid #5533aa;
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.admin-badge {
  font-size: 11px;
  font-weight: 700;
  color: #bb88ff;
  background: #2a1050;
  border-radius: 6px;
  padding: 3px 8px;
}
.admin-actions { display: flex; gap: 6px; }
.admin-btn {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 7px;
  border: 1px solid;
  cursor: pointer;
  transition: opacity 0.15s;
}
.admin-btn:active { opacity: 0.7; }
.admin-btn-setup  { background: #1a1030; color: #bb88ff; border-color: #5533aa; }
.admin-btn-cancel { background: #200a0a; color: #ff7777; border-color: #aa3333; }

.teams-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.team-box {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 12px;
  overflow: hidden;
}
.team-header {
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
}
.team-a .team-header { background: #1a1030; color: #aa66ff; }
.team-b .team-header { background: #0a1a10; color: #44cc88; }

.slot {
  padding: 9px 10px;
  border-top: 1px solid #1e1e3a;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  transition: background 0.15s;
  min-height: 40px;
}
.slot:active { background: #1e1e3a; }
.slot.filled { cursor: default; }
.slot.filled:active { background: transparent; }
.slot.mine { background: #0d1a10; }

/* 관리자 모드에서 슬롯 */
.admin-mode .slot.filled { cursor: pointer; }
.admin-mode .slot.filled:active { background: #1e1e3a; }
.admin-mode .slot:not(.filled) { border: 1px dashed #5533aa44; }

.pos-badge {
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 4px;
  font-weight: 700;
  flex-shrink: 0;
  white-space: nowrap;
}
.pos-top { background: #2a1a3a; color: #aa77ff; }
.pos-jg  { background: #1a2a1a; color: #44bb44; }
.pos-mid { background: #2a2210; color: #ddaa33; }
.pos-adc { background: #2a1010; color: #ee5555; }
.pos-sup { background: #102030; color: #4488ee; }
.pos-sna { background: #2a1010; color: #ff7777; }
.pos-rfl { background: #102010; color: #77cc77; }

.slot-name  { font-size: 12px; color: #fff; flex: 1; }
.slot-empty { font-size: 11px; color: #44446688; flex: 1; font-style: italic; }
.slot-mine-badge {
  font-size: 9px;
  color: #44cc88;
  background: #0a2010;
  border-radius: 4px;
  padding: 1px 5px;
}
.slot-admin-add {
  font-size: 10px;
  color: #bb88ff;
  background: #1a1030;
  border-radius: 4px;
  padding: 2px 6px;
  border: 1px solid #5533aa44;
}
.slot-admin-remove {
  font-size: 10px;
  color: #ff7777;
  background: #200a0a;
  border-radius: 4px;
  padding: 2px 6px;
  border: 1px solid #aa333344;
}

.btn-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 12px 14px 24px;
  background: #0a0a1a;
  border-top: 1px solid #1e1e3a;
}
.btn-join {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.btn-join.active   { background: #4a9eff; color: #fff; }
.btn-join.inactive { background: #1e1e3a; color: #444466; cursor: not-allowed; }
.btn-join.cancel   { background: #cc3333; color: #fff; }
.btn-join.full     { background: #1d9e75; color: #fff; cursor: not-allowed; }

/* 일반 모달 */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #12122a;
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 32px;
  width: 100%;
  max-width: 480px;
}
.modal-title {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 16px;
}
.modal-sub {
  font-size: 12px;
  color: #8888bb;
  text-align: center;
  margin-bottom: 16px;
  margin-top: -10px;
}
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.modal-btn {
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid #1e1e3a;
  background: #0a0a1a;
  color: #ccc;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.modal-btn:active { transform: scale(0.97); }
.modal-btn.disabled { opacity: 0.35; cursor: not-allowed; }
.modal-btn.sel-team-a { border-color: #aa66ff; background: #1a1030; color: #aa66ff; }
.modal-btn.sel-team-b { border-color: #44cc88; background: #0a1a10; color: #44cc88; }
.modal-cancel {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #1e1e3a;
  background: transparent;
  color: #8888bb;
  font-size: 13px;
  cursor: pointer;
  margin-top: 4px;
}

/* 관리자 이름 입력 모달 */
.admin-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
}
.admin-modal-overlay.show { display: flex; }
.admin-modal {
  background: #12122a;
  border: 1px solid #5533aa;
  border-radius: 16px;
  padding: 20px 18px 18px;
  width: 100%;
  max-width: 360px;
}
.admin-modal-title {
  font-size: 14px;
  font-weight: 700;
  color: #bb88ff;
  margin-bottom: 14px;
  text-align: center;
}
.admin-input {
  width: 100%;
  background: #0a0a1a;
  border: 1px solid #3a3a6a;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  padding: 12px 14px;
  margin-bottom: 12px;
  outline: none;
}
.admin-input:focus { border-color: #5533aa; }
.admin-input::placeholder { color: #44446699; }
.admin-modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.admin-confirm-btn {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #5533aa;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.admin-confirm-btn:active { opacity: 0.8; }
.admin-dismiss-btn {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #3a3a6a;
  background: transparent;
  color: #8888bb;
  font-size: 13px;
  cursor: pointer;
}

/* 완료 화면 */
.done-screen {
  display: none;
  flex-direction: column;
  gap: 14px;
  flex: 1;
  padding: 14px;
}
.done-header {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 14px;
  padding: 24px;
  text-align: center;
}
.done-icon  { font-size: 40px; margin-bottom: 8px; }
.done-title { font-size: 18px; font-weight: 700; color: #fff; }
.done-sub   { font-size: 12px; color: #8888bb; margin-top: 4px; }

.sec-label { color: #8888bb; font-size: 10px; margin-bottom: 5px; letter-spacing: 0.04em; }

/* 토스트 */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: #1d9e75;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 20px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.error { background: #cc3333; }
</style>
</head>
<body>

<div class="topbar">
  <div class="top-title" id="top-title">⚔️ 내전 모집</div>
  <div class="top-sub" id="top-sub">포지션을 선택해서 참여하세요</div>
</div>

<div class="content" id="main-content">
  <div class="status-bar">
    <span class="st-label">참여 현황</span>
    <span class="st-val" id="status-val">로딩 중...</span>
  </div>

  <!-- 관리자 배너 (관리자만 표시) -->
  <div class="admin-banner" id="admin-banner" style="display:none">
    <span class="admin-badge">👑 관리자 모드</span>
    <div class="admin-actions">
      <button class="admin-btn admin-btn-setup" onclick="openSetupModal()">⚙️ 내전 설정</button>
      <button class="admin-btn admin-btn-cancel" onclick="adminCancelRoom()">🗑 내전 취소</button>
    </div>
  </div>

  <div>
    <div class="sec-label" id="teams-label">팀 구성</div>
    <div class="teams-wrap" id="teams-wrap"></div>
  </div>
</div>

<!-- 완료 화면 -->
<div class="done-screen" id="done-screen">
  <div class="done-header">
    <div class="done-icon">⚔️</div>
    <div class="done-title">내전 시작!</div>
    <div class="done-sub">모든 슬롯이 채워졌어요. 그룹 채팅을 확인하세요!</div>
  </div>
</div>

<div class="btn-wrap" id="btn-wrap">
  <button class="btn-join inactive" id="btn-join" onclick="handleJoin()">
    슬롯을 선택해서 참여하세요
  </button>
</div>

<!-- 포지션 선택 모달 (일반 유저) -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">포지션 & 팀 선택</div>
    <div class="modal-sub" id="modal-sub"></div>

    <div class="sec-label">팀 선택</div>
    <div class="modal-grid" style="grid-template-columns:1fr 1fr; margin-bottom:14px">
      <div class="modal-btn" id="m-team-a" onclick="selectTeam('A')">🟣 1팀</div>
      <div class="modal-btn" id="m-team-b" onclick="selectTeam('B')">🟢 2팀</div>
    </div>

    <div class="sec-label">포지션 선택</div>
    <div class="modal-grid" id="modal-pos-grid"></div>

    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- 관리자: 이름 직접 입력 모달 -->
<div class="admin-modal-overlay" id="admin-add-modal">
  <div class="admin-modal">
    <div class="admin-modal-title" id="admin-add-title">👑 슬롯에 참여자 추가</div>
    <input class="admin-input" type="text" id="admin-name-input"
           placeholder="참여자 이름 입력" maxlength="20" />
    <div class="admin-modal-btns">
      <button class="admin-confirm-btn" onclick="confirmAdminAdd()">추가</button>
      <button class="admin-dismiss-btn" onclick="closeAdminAddModal()">취소</button>
    </div>
  </div>
</div>

<!-- 관리자: 강제 제거 확인 모달 -->
<div class="admin-modal-overlay" id="admin-remove-modal">
  <div class="admin-modal">
    <div class="admin-modal-title" id="admin-remove-title">🗑 참여자 강제 제거</div>
    <p style="font-size:13px;color:#aaa;text-align:center;margin-bottom:14px" id="admin-remove-sub"></p>
    <div class="admin-modal-btns">
      <button class="admin-confirm-btn" style="background:#cc3333" onclick="confirmAdminRemove()">제거</button>
      <button class="admin-dismiss-btn" onclick="closeAdminRemoveModal()">취소</button>
    </div>
  </div>
</div>

<!-- 관리자: 내전 설정 모달 -->
<div class="admin-modal-overlay" id="setup-modal">
  <div class="admin-modal" style="max-width:400px">
    <div class="admin-modal-title">⚙️ 내전 설정</div>
    <div style="font-size:12px;color:#8888bb;margin-bottom:10px">부가 텍스트 (선택)</div>
    <input class="admin-input" type="text" id="setup-extra-text"
           placeholder="예: 승리팀 10만원 찬조" maxlength="50" />
    <div style="font-size:12px;color:#8888bb;margin-bottom:6px">1팀 포지션 순서</div>
    <input class="admin-input" type="text" id="setup-pos-a"
           placeholder="예: 탑,정글,미드,원딜,서폿" />
    <div style="font-size:12px;color:#8888bb;margin-bottom:6px">2팀 포지션 순서</div>
    <input class="admin-input" type="text" id="setup-pos-b"
           placeholder="예: 탑,정글,미드,원딜,서폿" />
    <div class="admin-modal-btns">
      <button class="admin-confirm-btn" onclick="confirmSetup()">적용 & 시작</button>
      <button class="admin-dismiss-btn" onclick="closeSetupModal()">취소</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 파라미터 파싱 ──
let userId   = null;
let groupId  = null;
let gameType = null;
let roomId   = null;

try {
  const params = new URLSearchParams(window.location.search);
  const start  = params.get('start');
  if (start) {
    const parts = start.split('_');
    userId   = parts[0] || null;
    groupId  = parts[1] || null;
    gameType = parts[2] || null;
    roomId   = parts[3] || null;
  }
} catch(e) {}

// ── 관리자 판별 ──
// 서버에서 ADMIN_IDS를 직접 확인하는 방식으로 처리
// 클라이언트에서는 /naejeon/room 응답에 isAdmin 포함시킬 수도 있지만
// 현재 구조상 userId로 체크 (서버에서 403 반환으로 보호됨)
let isAdmin = false;

// ── 게임 설정 ──
const GAME_CONFIG = {
  lol: {
    name: '리그오브레전드 5v5',
    total: 10,
    perTeam: 5,
    positions: [
      { id: 'top',  label: '탑',  cls: 'pos-top' },
      { id: 'jg',   label: '정글', cls: 'pos-jg'  },
      { id: 'mid',  label: '미드', cls: 'pos-mid' },
      { id: 'adc',  label: '원딜', cls: 'pos-adc' },
      { id: 'sup',  label: '서폿', cls: 'pos-sup' },
    ]
  },
  sa5: {
    name: '서든어택 5v5',
    total: 10,
    perTeam: 5,
    positions: [
      { id: 'sna',  label: '스나', cls: 'pos-sna' },
      { id: 'rfl1', label: '라플', cls: 'pos-rfl' },
      { id: 'rfl2', label: '라플', cls: 'pos-rfl' },
      { id: 'rfl3', label: '라플', cls: 'pos-rfl' },
      { id: 'rfl4', label: '라플', cls: 'pos-rfl' },
    ]
  },
  sa6: {
    name: '서든어택 6v6',
    total: 12,
    perTeam: 6,
    positions: [
      { id: 'sna1', label: '스나', cls: 'pos-sna' },
      { id: 'sna2', label: '스나', cls: 'pos-sna' },
      { id: 'rfl1', label: '라플', cls: 'pos-rfl' },
      { id: 'rfl2', label: '라플', cls: 'pos-rfl' },
      { id: 'rfl3', label: '라플', cls: 'pos-rfl' },
      { id: 'rfl4', label: '라플', cls: 'pos-rfl' },
    ]
  }
};

let config   = GAME_CONFIG[gameType] || GAME_CONFIG['lol'];
let roomData = null;
let mySlot   = null;
let selTeam  = null;
let selPos   = null;
let clickedSlot    = null;
let adminAddSlot   = null;  // { team, posId, slotKey }
let adminRemoveSlot = null; // { slotKey, name }

document.getElementById('top-title').textContent = '⚔️ ' + config.name;

// ── 토스트 ──
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 2200);
}

// ── 관리자 여부 서버 확인 ──
async function checkAdmin() {
  try {
    // admin_add 엔드포인트에 더미 요청으로 403 여부 확인 대신
    // room 데이터 로드 후 서버에서 isAdmin 플래그 받는 방식으로 처리
    // 현재 서버 구조상: /naejeon/room 응답에 isAdmin 없음
    // → /naejeon/admin_add 로 빈 요청 보내서 403이면 비관리자
    const res = await fetch('/naejeon/admin_add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomId, userId: parseInt(userId), groupId: parseInt(groupId), slotKey: '_ping', name: '' })
    });
    // 400은 name 비어있어서 / 403은 권한 없음
    isAdmin = (res.status !== 403);
  } catch(e) {
    isAdmin = false;
  }
}

// ── 데이터 로드 ──
async function loadRoom() {
  try {
    const res = await fetch(`/naejeon/room?roomId=${roomId}&userId=${userId}`);
    const data = await res.json();
    if (data.error) {
      document.getElementById('main-content').innerHTML =
        `<div style="text-align:center;padding:40px;color:#8888bb">${data.error}</div>`;
      return;
    }
    roomData = data;
    config   = GAME_CONFIG[roomData.gameType] || config;
    document.getElementById('top-title').textContent = '⚔️ ' + config.name;
    renderRoom();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      '<div style="text-align:center;padding:40px;color:#8888bb">로드 실패. 새로고침해주세요.</div>';
  }
}

// ── 렌더링 ──
function renderRoom() {
  if (!roomData) return;
  const slots  = roomData.slots || {};
  const filled = Object.values(slots).filter(s => s).length;
  const total  = config.total;

  mySlot = null;
  for (const [key, slot] of Object.entries(slots)) {
    if (slot && String(slot.userId) === String(userId)) {
      mySlot = key;
    }
  }

  // 관리자 배너
  const banner = document.getElementById('admin-banner');
  banner.style.display = isAdmin ? 'flex' : 'none';

  // 관리자 모드 클래스
  const wrap = document.getElementById('teams-wrap');
  wrap.className = 'teams-wrap' + (isAdmin ? ' admin-mode' : '');

  // 상태 바
  const stVal = document.getElementById('status-val');
  stVal.textContent = `${filled} / ${total}명`;
  stVal.className   = filled === total ? 'st-val st-full' : 'st-val';

  // 팀 렌더
  wrap.innerHTML = '';
  ['A', 'B'].forEach(team => {
    const teamEl   = document.createElement('div');
    const teamCls  = team === 'A' ? 'team-a' : 'team-b';
    const teamColor = team === 'A' ? '🟣 1팀' : '🟢 2팀';
    teamEl.className = `team-box ${teamCls}`;
    teamEl.innerHTML = `<div class="team-header">${teamColor}</div>`;

    config.positions.forEach(pos => {
      const key  = `${team}_${pos.id}`;
      const slot = slots[key];
      const isMine = slot && String(slot.userId) === String(userId);
      const div  = document.createElement('div');
      div.className = 'slot' + (slot ? ' filled' : '') + (isMine ? ' mine' : '');

      if (slot) {
        // 채워진 슬롯
        div.innerHTML = `
          <span class="pos-badge ${pos.cls}">${pos.label}</span>
          <span class="slot-name">${slot.name}</span>
          ${isMine ? '<span class="slot-mine-badge">나</span>' : ''}
          ${isAdmin ? `<span class="slot-admin-remove" onclick="openAdminRemove('${key}','${slot.name}',event)">제거</span>` : ''}
        `;
      } else {
        // 빈 슬롯
        div.innerHTML = `
          <span class="pos-badge ${pos.cls}">${pos.label}</span>
          <span class="slot-empty">${isAdmin ? '+ 추가' : '비어있음'}</span>
          ${isAdmin ? `<span class="slot-admin-add">추가</span>` : ''}
        `;
        // 클릭 이벤트
        if (isAdmin) {
          div.onclick = () => openAdminAdd(team, pos);
        } else if (!mySlot && filled < total) {
          div.onclick = () => openModal(team, pos);
        }
      }
      teamEl.appendChild(div);
    });
    wrap.appendChild(teamEl);
  });

  // 하단 버튼
  const btn = document.getElementById('btn-join');
  if (roomData.status === 'closed' || filled === total) {
    btn.className   = 'btn-join full';
    btn.textContent = '✅ 모집 완료!';
  } else if (isAdmin) {
    btn.className   = 'btn-join inactive';
    btn.textContent = '👑 관리자 모드 — 슬롯을 탭해 직접 추가';
  } else if (mySlot) {
    btn.className   = 'btn-join cancel';
    btn.textContent = '❌ 참여 취소하기';
  } else {
    btn.className   = 'btn-join inactive';
    btn.textContent = '위 슬롯을 탭해서 참여하세요';
  }
}

// ══════════════════════════════════════
// 관리자: 슬롯 추가
// ══════════════════════════════════════
function openAdminAdd(team, pos) {
  adminAddSlot = { team, pos, slotKey: `${team}_${pos.id}` };
  document.getElementById('admin-add-title').textContent
    = `👑 ${team === 'A' ? '1팀' : '2팀'} [${pos.label}] 에 추가`;
  document.getElementById('admin-name-input').value = '';
  document.getElementById('admin-add-modal').classList.add('show');
  setTimeout(() => document.getElementById('admin-name-input').focus(), 100);
}

function closeAdminAddModal() {
  document.getElementById('admin-add-modal').classList.remove('show');
  adminAddSlot = null;
}

async function confirmAdminAdd() {
  const name = document.getElementById('admin-name-input').value.trim();
  if (!name) { showToast('이름을 입력해주세요!', true); return; }
  if (!adminAddSlot) return;

  const btn = document.querySelector('#admin-add-modal .admin-confirm-btn');
  btn.textContent = '추가 중...';

  try {
    const res  = await fetch('/naejeon/admin_add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomId,
        userId: parseInt(userId),
        groupId: parseInt(groupId),
        slotKey: adminAddSlot.slotKey,
        name
      })
    });
    const data = await res.json();
    closeAdminAddModal();
    if (data.ok) {
      roomData = data.room;
      renderRoom();
      showToast(`✅ ${name} 추가 완료!`);
    } else {
      showToast(data.error || '오류가 발생했어요.', true);
    }
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.', true);
  } finally {
    btn.textContent = '추가';
  }
}

// ══════════════════════════════════════
// 관리자: 슬롯 강제 제거
// ══════════════════════════════════════
function openAdminRemove(slotKey, name, event) {
  event.stopPropagation();
  adminRemoveSlot = { slotKey, name };
  document.getElementById('admin-remove-title').textContent = '🗑 참여자 강제 제거';
  document.getElementById('admin-remove-sub').textContent
    = `"${name}" 님을 정말 제거할까요?`;
  document.getElementById('admin-remove-modal').classList.add('show');
}

function closeAdminRemoveModal() {
  document.getElementById('admin-remove-modal').classList.remove('show');
  adminRemoveSlot = null;
}

async function confirmAdminRemove() {
  if (!adminRemoveSlot) return;
  const btn = document.querySelector('#admin-remove-modal .admin-confirm-btn');
  btn.textContent = '제거 중...';

  try {
    const res  = await fetch('/naejeon/admin_remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomId,
        userId: parseInt(userId),
        groupId: parseInt(groupId),
        slotKey: adminRemoveSlot.slotKey
      })
    });
    const data = await res.json();
    closeAdminRemoveModal();
    if (data.ok) {
      roomData = data.room;
      renderRoom();
      showToast(`🗑 ${adminRemoveSlot.name} 제거 완료`);
    } else {
      showToast(data.error || '오류가 발생했어요.', true);
    }
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.', true);
  } finally {
    btn.textContent = '제거';
  }
}

// ══════════════════════════════════════
// 관리자: 내전 설정 (setup)
// ══════════════════════════════════════
function openSetupModal() {
  // 기존 extra_text 자동 채우기
  if (roomData && roomData.extraText) {
    document.getElementById('setup-extra-text').value = roomData.extraText;
  }
  // 기본 포지션 힌트
  const posHint = config.positions.map(p => p.label).join(',');
  document.getElementById('setup-pos-a').placeholder = posHint;
  document.getElementById('setup-pos-b').placeholder = posHint;
  if (roomData && roomData.posA && roomData.posA.length > 0) {
    document.getElementById('setup-pos-a').value = roomData.posA.join(',');
    document.getElementById('setup-pos-b').value = (roomData.posB || []).join(',');
  }
  document.getElementById('setup-modal').classList.add('show');
}

function closeSetupModal() {
  document.getElementById('setup-modal').classList.remove('show');
}

async function confirmSetup() {
  const extraText = document.getElementById('setup-extra-text').value.trim();
  const posAStr   = document.getElementById('setup-pos-a').value.trim();
  const posBStr   = document.getElementById('setup-pos-b').value.trim();
  const posA = posAStr ? posAStr.split(',').map(s => s.trim()).filter(Boolean) : config.positions.map(p => p.label);
  const posB = posBStr ? posBStr.split(',').map(s => s.trim()).filter(Boolean) : config.positions.map(p => p.label);

  const btn = document.querySelector('#setup-modal .admin-confirm-btn');
  btn.textContent = '적용 중...';

  try {
    const res  = await fetch('/naejeon/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomId,
        userId: parseInt(userId),
        groupId: parseInt(groupId),
        gameType,
        extraText,
        posA,
        posB
      })
    });
    const data = await res.json();
    closeSetupModal();
    if (data.ok) {
      roomData = data.room;
      renderRoom();
      showToast('✅ 내전 설정 완료! 그룹에 공지됐어요.');
    } else {
      showToast(data.error || '오류가 발생했어요.', true);
    }
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.', true);
  } finally {
    btn.textContent = '적용 & 시작';
  }
}

// ══════════════════════════════════════
// 관리자: 내전 취소
// ══════════════════════════════════════
async function adminCancelRoom() {
  if (!confirm('정말 내전을 취소할까요?')) return;
  try {
    // 서버 내전취소는 봇 명령어(/내전취소)로만 처리됨
    // 웹에서는 status를 cancelled로 변경하는 별도 API 필요
    // 현재 구조상 아래 엔드포인트 호출
    const res = await fetch('/naejeon/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomId,
        userId: parseInt(userId),
        groupId: parseInt(groupId)
      })
    });
    const data = await res.json();
    if (data.ok) {
      showToast('✅ 내전이 취소됐어요.');
      setTimeout(() => { window.location.reload(); }, 1500);
    } else {
      showToast(data.error || '오류가 발생했어요.', true);
    }
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.', true);
  }
}

// ══════════════════════════════════════
// 일반 유저 모달
// ══════════════════════════════════════
function openModal(team, pos) {
  if (mySlot || isAdmin) return;
  clickedSlot = { team, pos };
  selTeam = null;
  selPos  = pos.id;

  document.getElementById('modal-title').textContent = pos.label + ' 포지션';
  document.getElementById('modal-sub').textContent   = '팀을 선택해주세요';

  const slots = roomData.slots || {};
  const aFull = config.positions.every(p => slots[`A_${p.id}`]);
  const bFull = config.positions.every(p => slots[`B_${p.id}`]);

  const mA = document.getElementById('m-team-a');
  const mB = document.getElementById('m-team-b');
  mA.className = 'modal-btn' + (aFull ? ' disabled' : '');
  mB.className = 'modal-btn' + (bFull ? ' disabled' : '');

  selectTeam(team);
  document.getElementById('modal').classList.add('show');
}

function selectTeam(team) {
  const slots = roomData.slots || {};
  const key   = `${team}_${clickedSlot?.pos?.id}`;
  if (slots[key]) return;

  selTeam = team;
  document.getElementById('m-team-a').className = 'modal-btn' + (team === 'A' ? ' sel-team-a' : '');
  document.getElementById('m-team-b').className = 'modal-btn' + (team === 'B' ? ' sel-team-b' : '');
  updateConfirmBtn();
}

function updateConfirmBtn() {
  let confirmEl = document.getElementById('modal-confirm');
  if (!confirmEl) {
    confirmEl = document.createElement('button');
    confirmEl.id        = 'modal-confirm';
    confirmEl.className = 'btn-join active';
    confirmEl.style.cssText = 'margin-bottom:8px;border-radius:10px;padding:12px;font-size:14px;';
    confirmEl.onclick = confirmJoin;
    document.querySelector('.modal').insertBefore(
      confirmEl,
      document.querySelector('.modal-cancel')
    );
  }
  confirmEl.textContent = selTeam
    ? `✅ ${selTeam === 'A' ? '1팀' : '2팀'} ${clickedSlot?.pos?.label}로 참여하기`
    : '팀을 선택해주세요';
  confirmEl.className = selTeam ? 'btn-join active' : 'btn-join inactive';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('show');
  const c = document.getElementById('modal-confirm');
  if (c) c.remove();
}

async function confirmJoin() {
  if (!selTeam || !clickedSlot) return;
  const btn = document.getElementById('modal-confirm');
  if (btn) { btn.textContent = '참여 중...'; btn.className = 'btn-join inactive'; }

  try {
    const res  = await fetch('/naejeon/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomId, userId, groupId,
        team: selTeam,
        posId: clickedSlot.pos.id,
        posLabel: clickedSlot.pos.label
      })
    });
    const data = await res.json();
    document.getElementById('modal').classList.remove('show');
    if (btn) btn.remove();
    if (data.ok) {
      roomData = data.room;
      renderRoom();
      showToast('✅ 참여 완료!');
    } else {
      showToast(data.error || '오류가 발생했어요.', true);
    }
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.', true);
  }
}

async function handleJoin() {
  if (isAdmin) return;
  if (!mySlot) return;
  const btn = document.getElementById('btn-join');
  btn.textContent = '취소 중...';

  try {
    const res  = await fetch('/naejeon/leave', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomId, userId, groupId })
    });
    const data = await res.json();
    if (data.ok) {
      roomData = data.room;
      renderRoom();
      showToast('참여가 취소됐어요.');
    } else {
      showToast(data.error || '오류가 발생했어요.', true);
    }
  } catch(e) {
    showToast('오류가 발생했어요. 다시 시도해주세요.', true);
  }
}

// ── 초기화 ──
async function init() {
  await checkAdmin();
  await loadRoom();
  setInterval(loadRoom, 5000);
}

init();
</script>
</body>
