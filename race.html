<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KBO 승 예측</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: #12122a;
  padding: 14px 16px 10px;
  text-align: center;
  border-bottom: 1px solid #1e1e3a;
  flex-shrink: 0;
}
.top-title { font-size: 16px; font-weight: 700; color: #fff; }
.top-sub   { font-size: 11px; color: #8888bb; margin-top: 3px; }

.content {
  flex: 1;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 90px;
}

/* 타이머 */
.timer-box {
  background: #16102a;
  border: 1px solid #3a1a5a;
  border-radius: 10px;
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.timer-label { color: #9966cc; font-size: 12px; flex: 1; }
.timer-val   { color: #cc88ff; font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
.timer-dot   { color: #cc88ff; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 인기팀 배너 */
.hot-box {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 10px;
  padding: 9px 12px;
}
.hot-title { font-size: 10px; color: #8888bb; margin-bottom: 6px; letter-spacing: 0.04em; }
.hot-list  { display: flex; gap: 6px; flex-wrap: wrap; }
.hot-tag {
  background: #1e1e3a;
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  color: #ccc;
  display: flex;
  align-items: center;
  gap: 4px;
}
.hot-tag .rank1 { color: #ffd700; }
.hot-tag .rank2 { color: #c0c0c0; }
.hot-tag .rank3 { color: #cd7f32; }

/* 섹션 */
.sec-label { color: #8888bb; font-size: 11px; margin-bottom: 6px; letter-spacing: 0.04em; }

/* 팀 그리드 */
.team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.tc {
  background: #12122a;
  border: 1.5px solid #1e1e3a;
  border-radius: 12px;
  padding: 10px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  position: relative;
}
.tc:active { transform: scale(0.97); }
.tc.sel {
  border-color: #4a9eff;
  background: #0d1a30;
}
.tc-logo {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: #1e1e3a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  overflow: hidden;
}
.tc-logo img { width: 100%; height: 100%; object-fit: contain; }
.tc-name { font-size: 13px; font-weight: 500; color: #ccc; flex: 1; }
.tc.sel .tc-name { color: #fff; }
.tc-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #4a9eff;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  flex-shrink: 0;
}
.tc.sel .tc-check { display: flex; }

/* 선택 카운터 */
.count-bar {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.count-label { color: #8888bb; font-size: 12px; }
.count-pills { display: flex; gap: 4px; }
.pill {
  width: 28px;
  height: 8px;
  border-radius: 4px;
  background: #1e1e3a;
  transition: background 0.2s;
}
.pill.filled { background: #4a9eff; }

/* 제출 버튼 - 하단 고정 */
.btn-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 14px 20px;
  background: linear-gradient(0deg, #0a0a1a 70%, transparent);
}
.btn-submit {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: all 0.2s;
}
.btn-submit.inactive {
  background: #1e1e3a;
  color: #444466;
  cursor: not-allowed;
}
.btn-submit.active {
  background: #4a9eff;
  color: #fff;
  box-shadow: 0 0 24px #4a9eff66, 0 4px 16px #4a9eff44;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 24px #4a9eff66, 0 4px 16px #4a9eff44; }
  50%      { box-shadow: 0 0 36px #4a9effaa, 0 4px 24px #4a9eff66; }
}
.btn-submit.done {
  background: #1d9e75;
  color: #fff;
  box-shadow: 0 0 24px #1d9e7566;
  animation: none;
}

/* 결과 화면 */
.result-screen {
  display: none;
  flex-direction: column;
  gap: 14px;
  flex: 1;
}
.result-header {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
}
.result-icon  { font-size: 40px; margin-bottom: 8px; }
.result-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.result-sub   { font-size: 12px; color: #8888bb; }
.result-teams {
  background: #12122a;
  border: 1px solid #1e1e3a;
  border-radius: 14px;
  padding: 14px;
}
.result-team-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #1e1e3a;
}
.result-team-row:last-child { border-bottom: none; }
.result-team-logo {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  background: #1e1e3a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  overflow: hidden;
}
.result-team-logo img { width: 100%; height: 100%; object-fit: contain; }
.result-team-name { font-size: 14px; font-weight: 500; color: #fff; flex: 1; }
.result-check { color: #4a9eff; font-size: 16px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="top-title">⚾ KBO 승 예측</div>
  <div class="top-sub">5경기 모두 맞추면 3만원!</div>
</div>

<div class="content" id="main-content">

  <!-- 타이머 -->
  <div class="timer-box">
    <span class="timer-label">⏰ 마감까지</span>
    <span class="timer-val" id="timer-val">-- : -- : --</span>
  </div>

  <!-- 인기팀 -->
  <div class="hot-box">
    <div class="hot-title">🔥 오늘 많이 선택된 팀</div>
    <div class="hot-list" id="hot-list">
      <div class="hot-tag"><span class="rank1">1위</span> 로딩중...</div>
    </div>
  </div>

  <!-- 팀 선택 -->
  <div>
    <div class="sec-label">승리할 팀 5개를 선택하세요</div>
    <div class="team-grid" id="team-grid"></div>
  </div>

  <!-- 선택 카운터 -->
  <div class="count-bar">
    <span class="count-label" id="count-label">0개 선택됨</span>
    <div class="count-pills" id="count-pills">
      <div class="pill" id="p0"></div>
      <div class="pill" id="p1"></div>
      <div class="pill" id="p2"></div>
      <div class="pill" id="p3"></div>
      <div class="pill" id="p4"></div>
    </div>
  </div>

</div>

<!-- 결과 화면 -->
<div class="content result-screen" id="result-screen">
  <div class="result-header">
    <div class="result-icon">✅</div>
    <div class="result-title">예측 완료!</div>
    <div class="result-sub" id="result-sub">선택한 팀 5개가 제출됐어요</div>
  </div>
  <div class="result-teams" id="result-teams"></div>
</div>

<!-- 하단 제출 버튼 -->
<div class="btn-wrap">
  <button class="btn-submit inactive" id="btn-submit" onclick="handleSubmit()">
    5개 팀을 선택해주세요
  </button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── 파라미터 파싱 ──
let userId  = null;
let groupId = null;

try {
  const params = new URLSearchParams(window.location.search);
  const start  = params.get('start');
  if (start) {
    const parts = start.split('_');
    userId  = parts[0] || null;
    groupId = parts[1] || null;
  }
} catch(e) {}

// ── 팀 데이터 ──
const TEAMS = [
  { id: 'KT',   name: 'KT',   emoji: '🔴', logo: 'https://upload.wikimedia.org/wikipedia/en/c/c2/KT_Wiz_logo.png' },
  { id: '삼성', name: '삼성', emoji: '🔵', logo: 'https://upload.wikimedia.org/wikipedia/en/3/38/Samsung_Lions_logo.png' },
  { id: 'LG',   name: 'LG',   emoji: '🔴', logo: 'https://upload.wikimedia.org/wikipedia/en/a/a2/LG_Twins_logo.png' },
  { id: 'SSG',  name: 'SSG',  emoji: '🟡', logo: 'https://upload.wikimedia.org/wikipedia/en/7/71/SSG_Landers_logo.png' },
  { id: 'KIA',  name: 'KIA',  emoji: '🔴', logo: 'https://upload.wikimedia.org/wikipedia/en/a/ac/Kia_Tigers_logo.png' },
  { id: '한화', name: '한화', emoji: '🟠', logo: 'https://upload.wikimedia.org/wikipedia/en/9/98/Hanwha_Eagles_logo.png' },
  { id: '두산', name: '두산', emoji: '🔵', logo: 'https://upload.wikimedia.org/wikipedia/en/9/9d/Doosan_Bears_logo.png' },
  { id: 'NC',   name: 'NC',   emoji: '🔵', logo: 'https://upload.wikimedia.org/wikipedia/en/b/b8/NC_Dinos_logo.png' },
  { id: '롯데', name: '롯데', emoji: '🔴', logo: 'https://upload.wikimedia.org/wikipedia/en/5/56/Lotte_Giants_logo.png' },
  { id: '키움', name: '키움', emoji: '🟣', logo: 'https://upload.wikimedia.org/wikipedia/en/8/8d/Kiwoom_Heroes_logo.png' },
];

let selected = [];

// ── 팀 카드 렌더 ──
function renderTeams() {
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  TEAMS.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tc';
    div.id = 'tc-' + t.id;
    div.onclick = () => toggle(t.id);
    div.innerHTML = `
      <div class="tc-logo">
        <img src="${t.logo}" onerror="this.style.display='none';this.parentNode.innerText='${t.emoji}'">
      </div>
      <span class="tc-name">${t.name}</span>
      <span class="tc-check">✓</span>
    `;
    grid.appendChild(div);
  });
}

// ── 토글 ──
function toggle(id) {
  const el = document.getElementById('tc-' + id);
  if (el.classList.contains('sel')) {
    el.classList.remove('sel');
    selected = selected.filter(t => t !== id);
  } else {
    if (selected.length >= 5) {
      el.style.borderColor = '#ff4444';
      setTimeout(() => el.style.borderColor = '', 400);
      return;
    }
    el.classList.add('sel');
    selected.push(id);
  }
  updateUI();
}

// ── UI 업데이트 ──
function updateUI() {
  const n = selected.length;
  document.getElementById('count-label').textContent = n + '개 선택됨';
  for (let i = 0; i < 5; i++) {
    const p = document.getElementById('p' + i);
    if (p) p.className = 'pill' + (i < n ? ' filled' : '');
  }
  const btn = document.getElementById('btn-submit');
  if (n === 5) {
    btn.className = 'btn-submit active';
    btn.textContent = '✅ 예측 제출하기';
  } else {
    btn.className = 'btn-submit inactive';
    btn.textContent = (5 - n) + '개 더 선택해주세요';
  }
}

// ── 제출 ──
async function handleSubmit() {
  if (selected.length !== 5) return;
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '제출 중...';

  try {
    await fetch('/kbo/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, groupId, teams: selected })
    });
  } catch(e) {}

  // 결과 화면 전환
  document.getElementById('main-content').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';

  const teamRows = selected.map(id => {
    const t = TEAMS.find(x => x.id === id);
    return `<div class="result-team-row">
      <div class="result-team-logo">
        <img src="${t.logo}" onerror="this.style.display='none';this.parentNode.innerText='${t.emoji}'">
      </div>
      <span class="result-team-name">${t.name}</span>
      <span class="result-check">✓</span>
    </div>`;
  }).join('');
  document.getElementById('result-teams').innerHTML = teamRows;

  btn.className = 'btn-submit done';
  btn.textContent = '✅ 제출 완료!';
  btn.disabled = false;
}

// ── 타이머 (18:30 마감 기준) ──
function updateTimer() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 3600 * 1000);
  const end = new Date(kst);
  end.setUTCHours(9, 30, 0, 0); // KST 18:30 = UTC 09:30
  let diff = Math.floor((end - kst) / 1000);
  if (diff < 0) diff = 0;
  const h = Math.floor(diff / 3600).toString().padStart(2, '0');
  const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
  const s = (diff % 60).toString().padStart(2, '0');
  document.getElementById('timer-val').textContent = h + ' : ' + m + ' : ' + s;
}
setInterval(updateTimer, 1000);
updateTimer();

// ── 인기팀 로드 ──
async function loadHotTeams() {
  try {
    const res = await fetch('/kbo/hot?groupId=' + groupId);
    const data = await res.json();
    const ranks = ['rank1', 'rank2', 'rank3'];
    const hotList = document.getElementById('hot-list');
    if (data && data.length > 0) {
      hotList.innerHTML = data.slice(0, 3).map((item, i) =>
        `<div class="hot-tag"><span class="${ranks[i] || ''}">${i+1}위</span> ${item.team} ${item.count}명</div>`
      ).join('');
    } else {
      hotList.innerHTML = '<div class="hot-tag">아직 참여자가 없어요</div>';
    }
  } catch(e) {
    document.getElementById('hot-list').innerHTML = '<div class="hot-tag">로딩 실패</div>';
  }
}

renderTeams();
if (groupId) loadHotTeams();
</script>
</body>
</html>
