<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>도파민 카지노 — 경주</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4a843;--gold2:#f0c96a;--gold3:#8b6914;
  --bg:#080810;--bg2:#0e0e1c;--bg3:#161628;--bg4:#1e1e35;
  --border:#2a2a45;--text:#e8e0cc;--sub:#6a6a8a;
  --rabbit:#4a9eff;--turtle:#44cc88;
}
html,body{height:100%;width:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.topbar{background:linear-gradient(180deg,#0e0e1e,#080810);border-bottom:1px solid var(--border);padding:12px 16px 10px;text-align:center;position:sticky;top:0;z-index:50;}
.casino-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--gold3);margin-bottom:3px;}
.top-title{font-family:'Cinzel',serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.point-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.point-val{font-size:16px;font-weight:700;color:var(--gold);}
.main{flex:1;overflow-y:auto;padding:14px 14px 100px;display:flex;flex-direction:column;gap:12px;}

.track-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.track-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.track-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1px;}
.track-wrap{padding:16px;background:linear-gradient(180deg,#060c08,#081008);}
.track-lane{position:relative;height:64px;border-radius:8px;background:linear-gradient(90deg,#060e08,#081208);border:1px solid rgba(255,255,255,0.06);margin-bottom:8px;overflow:hidden;}
.track-lane:last-child{margin-bottom:0;}
.track-lane::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 41px);}
.lane-label{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;z-index:2;}
.finish-line{position:absolute;right:0;top:0;bottom:0;width:16px;background:repeating-linear-gradient(180deg,#fff 0px,#fff 8px,#000 8px,#000 16px);opacity:0.5;}
.racer{position:absolute;top:50%;left:0;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;z-index:3;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5));transform:translateY(-50%) translateX(0px);will-change:transform;}
.racer.rabbit-racer{background:radial-gradient(circle,#1a3555,#0a1a30);border:2px solid var(--rabbit);box-shadow:0 0 12px rgba(74,158,255,0.4);}
.racer.turtle-racer{background:radial-gradient(circle,#0a2a18,#051510);border:2px solid var(--turtle);box-shadow:0 0 12px rgba(68,204,136,0.4);}
.racer.winner-glow{box-shadow:0 0 20px rgba(255,215,0,0.8)!important;border-color:var(--gold)!important;animation:winPulse 0.5s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(-50%) translateX(var(--tx,0px))}50%{transform:translateY(calc(-50% - 4px)) translateX(var(--tx,0px))}}
@keyframes winPulse{0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.12)}}

.odds-row{display:flex;border-top:1px solid var(--border);}
.odds-box{flex:1;padding:10px;text-align:center;}
.odds-box:first-child{border-right:1px solid var(--border);}
.odds-label{font-size:10px;color:var(--sub);margin-bottom:2px;}
.odds-val{font-size:18px;font-weight:900;}

.bet-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bet-opt{border-radius:14px;border:2px solid var(--border);background:var(--bg2);padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bet-opt:active{transform:scale(0.96);}
.bet-opt.sel-r{border-color:var(--rabbit);background:#051525;box-shadow:0 0 16px rgba(74,158,255,0.25);}
.bet-opt.sel-t{border-color:var(--turtle);background:#051a10;box-shadow:0 0 16px rgba(68,204,136,0.25);}
.opt-emoji{font-size:32px;}
.opt-name{font-size:14px;font-weight:800;}
.opt-odds{font-size:11px;color:var(--gold);}

.card-inner{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.card-title{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;}
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.preset{padding:9px 4px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.preset:active{background:var(--bg4);}
.amt-row{display:flex;gap:8px;align-items:center;}
.amt-inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:11px 14px;outline:none;}
.amt-inp:focus{border-color:var(--gold3);}
.bet-btn{width:100%;padding:16px;border-radius:14px;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.2s;background:linear-gradient(135deg,var(--gold),var(--gold3));color:#0a0800;box-shadow:0 4px 16px rgba(212,168,67,0.25);margin-top:10px;}
.bet-btn.off{background:var(--border);color:#333;cursor:default;box-shadow:none;}
.bet-btn:not(.off):active{transform:scale(0.98);}

.history-dots{display:flex;flex-wrap:wrap;gap:5px;}
.hdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;}
.overlay.show{display:flex;}
.ov-emoji{font-size:72px;animation:pop 0.4s ease-out;}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.ov-title{font-family:'Cinzel',serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ov-sub{font-size:13px;color:var(--sub);line-height:1.7;}
.ov-payout{font-size:30px;font-weight:900;}
.ov-close{padding:13px 30px;border-radius:12px;border:1px solid var(--gold3);background:transparent;color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;}

.home-btn{position:fixed;bottom:20px;left:16px;z-index:100;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--sub);font-size:12px;cursor:pointer;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0800;font-size:13px;font-weight:700;padding:10px 20px;border-radius:20px;z-index:500;opacity:0;transition:opacity 0.2s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
.toast.err{background:#cc3333;color:#fff;}

.racing-status{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:1px;min-height:28px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="casino-label">DOPAMINE CASINO</div>
  <div class="top-title">🐇 GRAND RACE 🐢</div>
</div>
<div class="point-bar">
  <span style="font-size:11px;color:var(--sub)">💰 내 포인트</span>
  <span class="point-val" id="my-point">— P</span>
</div>

<div class="main">
  <div class="track-card">
    <div class="track-header">
      <span class="track-title">RACE TRACK</span>
      <span style="font-size:11px;color:var(--sub)" id="track-status">베팅 후 START!</span>
    </div>
    <div class="track-wrap">
      <div class="track-lane">
        <span class="lane-label" style="color:var(--rabbit)">🐇 토끼</span>
        <div class="racer rabbit-racer" id="racer-rabbit">🐇</div>
        <div class="finish-line"></div>
      </div>
      <div class="track-lane">
        <span class="lane-label" style="color:var(--turtle)">🐢 거북이</span>
        <div class="racer turtle-racer" id="racer-turtle">🐢</div>
        <div class="finish-line"></div>
      </div>
    </div>
    <div class="odds-row">
      <div class="odds-box"><div class="odds-label">🐇 토끼 배당</div><div class="odds-val" style="color:var(--rabbit)">x 1.90</div></div>
      <div class="odds-box"><div class="odds-label">🐢 거북이 배당</div><div class="odds-val" style="color:var(--turtle)">x 1.90</div></div>
    </div>
  </div>

  <div class="racing-status" id="racing-status"></div>

  <div class="card-inner" id="bet-panel">
    <div class="card-title">— 베팅 선택 —</div>
    <div class="bet-opts">
      <div class="bet-opt" id="opt-r" onclick="pick('rabbit')">
        <div class="opt-emoji">🐇</div>
        <div class="opt-name" style="color:var(--rabbit)">토끼</div>
        <div class="opt-odds">x 1.90</div>
      </div>
      <div class="bet-opt" id="opt-t" onclick="pick('turtle')">
        <div class="opt-emoji">🐢</div>
        <div class="opt-name" style="color:var(--turtle)">거북이</div>
        <div class="opt-odds">x 1.90</div>
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="presets">
      <button class="preset" onclick="setAmt(100)">100</button>
      <button class="preset" onclick="setAmt(500)">500</button>
      <button class="preset" onclick="setAmt(1000)">1,000</button>
      <button class="preset" onclick="setMax()">MAX</button>
    </div>
    <div class="amt-row">
      <input class="amt-inp" type="number" id="amt" placeholder="베팅 금액" min="10" oninput="refreshBtn()"/>
      <span style="font-size:13px;color:var(--sub)">P</span>
    </div>
    <button class="bet-btn off" id="bet-btn" onclick="startRace()">베팅할 항목을 선택해주세요</button>
  </div>

  <div class="card-inner">
    <div class="card-title">HISTORY</div>
    <div class="history-dots" id="history-dots">
      <div style="font-size:11px;color:var(--sub)">기록 없음</div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-emoji" id="ov-emoji">🏆</div>
  <div class="ov-title" id="ov-title"></div>
  <div class="ov-sub" id="ov-sub"></div>
  <div class="ov-payout" id="ov-payout"></div>
  <button class="ov-close" onclick="closeOverlay()">다시 베팅</button>
</div>
<div class="toast" id="toast"></div>
<button class="home-btn" onclick="goHome()">🏠 홈</button>

<script>

// ── INLINE CORE ──
function getParam(key) {
  const sp = new URLSearchParams(location.search);
  if (sp.get(key)) return sp.get(key);
  const hp = new URLSearchParams(location.hash.replace(/^#/,''));
  if (hp.get(key)) return hp.get(key);
  const start = sp.get('tgWebAppStartParam')||hp.get('tgWebAppStartParam')||sp.get('start')||hp.get('start')||'';
  if (start) {
    const parts = start.split('_');
    if (key==='userId'  && parts[0]) return parts[0];
    if (key==='groupId' && parts[1]) return parts[1];
  }
  return null;
}
function _ptKey(g,u){return 'casino_pt_'+g+'_'+u;}
function getPoint(g,u){const v=localStorage.getItem(_ptKey(g,u));return v!==null?parseInt(v):5000;}
function setPoint(g,u,pt){localStorage.setItem(_ptKey(g,u),Math.max(0,Math.floor(pt)));}
function addPoint(g,u,delta){const n=Math.max(0,getPoint(g,u)+Math.floor(delta));setPoint(g,u,n);return n;}
function fmt(n){return Number(n||0).toLocaleString();}
function goHome(uid,gid){location.href='/casino?userId='+uid+'&groupId='+gid;}
function weightedRandom(weights){
  const total=weights.reduce((a,b)=>a+b.weight,0);
  let r=Math.random()*total;
  for(const w of weights){r-=w.weight;if(r<=0)return w.id;}
  return weights[weights.length-1].id;
}

const userId  = getParam('userId');
const groupId = getParam('groupId');
let myPt = getPoint(groupId, userId);
let picked = null, racing = false, raceAnim = null;
let rPos = 4, tPos = 4;
let history = [];
const ODDS = 1.90;

document.getElementById('my-point').textContent = fmt(myPt) + ' P';

function setRacerPos(id, pct) {
  const el = document.getElementById(id);
  if (!el) return;
  const lane = el.parentElement;
  const laneW = lane.offsetWidth || 300;
  const maxPx = laneW - 56;
  const px = Math.min(maxPx, Math.max(4, pct / 100 * maxPx));
  el.style.setProperty('--tx', px + 'px');
  el.style.transform = `translateY(-50%) translateX(${px}px)`;
}

function resetRacers() {
  rPos = 0; tPos = 0;
  const rEl = document.getElementById('racer-rabbit');
  const tEl = document.getElementById('racer-turtle');
  if (rEl) rEl.style.transform = 'translateY(-50%) translateX(0px)';
  if (tEl) tEl.style.transform = 'translateY(-50%) translateX(0px)';
  document.getElementById('racer-rabbit').classList.remove('winner-glow');
  document.getElementById('racer-turtle').classList.remove('winner-glow');
}

function animRace(winner, onDone) {
  if (raceAnim) cancelAnimationFrame(raceAnim);
  racing = true;
  rPos = 0; tPos = 0;
  setRacerPos('racer-rabbit', 0);
  setRacerPos('racer-turtle', 0);

  const startTime = performance.now();
  const duration  = 4200 + Math.random() * 800;

  // 미리 랜덤값 고정 (매 프레임 Math.random() 호출 금지)
  const rSpurt     = 0.3 + Math.random() * 0.3;
  const tSpurt     = 0.3 + Math.random() * 0.3;
  const rLoseMax   = 60 + Math.random() * 12;  // 패자 최대 도달 거리 고정
  const tLoseMax   = 60 + Math.random() * 12;

  function calcPos(t, winnerFlag, spurtAt, loseMax) {
    const targetMax = winnerFlag ? 96 : loseMax;
    let base = 1 - Math.pow(1 - t, 2.5);
    if (t > spurtAt && t < spurtAt + 0.15) {
      const spurtT = (t - spurtAt) / 0.15;
      base += Math.sin(spurtT * Math.PI) * 0.1;
    }
    return Math.min(1, Math.max(0, base)) * targetMax;
  }

  function tick(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    if (winner === 'rabbit') {
      rPos = calcPos(t,        true,  rSpurt, 96);
      tPos = calcPos(t * 0.86, false, tSpurt, tLoseMax);
    } else {
      tPos = calcPos(t,        true,  tSpurt, 96);
      rPos = calcPos(t * 0.86, false, rSpurt, rLoseMax);
    }

    const bounceR = Math.sin(now * 0.025) * 3;
    const bounceT = Math.sin(now * 0.018 + 1.5) * 3;
    const rEl = document.getElementById('racer-rabbit');
    const tEl = document.getElementById('racer-turtle');
    const laneW = (rEl?.parentElement?.offsetWidth || 300) - 56;

    if (rEl) rEl.style.transform = `translateY(calc(-50% + ${bounceR}px)) translateX(${rPos/100*laneW}px)`;
    if (tEl) tEl.style.transform = `translateY(calc(-50% + ${bounceT}px)) translateX(${tPos/100*laneW}px)`;

    if (t < 1) {
      raceAnim = requestAnimationFrame(tick);
    } else {
      racing = false;
      setRacerPos('racer-rabbit', rPos);
      setRacerPos('racer-turtle', tPos);
      document.getElementById('racer-' + winner).classList.add('winner-glow');
      if (onDone) setTimeout(onDone, 600);
    }
  }
  requestAnimationFrame(tick);
}

function pick(opt) {
  picked = opt;
  document.getElementById('opt-r').className = 'bet-opt' + (opt === 'rabbit' ? ' sel-r' : '');
  document.getElementById('opt-t').className = 'bet-opt' + (opt === 'turtle' ? ' sel-t' : '');
  refreshBtn();
}

function setAmt(v) { document.getElementById('amt').value = v; refreshBtn(); }
function setMax() { setAmt(Math.min(myPt, 10000)); }

function refreshBtn() {
  const btn = document.getElementById('bet-btn');
  const amt = parseInt(document.getElementById('amt').value) || 0;
  if (racing) { btn.className = 'bet-btn off'; btn.textContent = '🏃 경주 중...'; return; }
  if (!picked) { btn.className = 'bet-btn off'; btn.textContent = '베팅할 항목을 선택해주세요'; return; }
  if (amt < 10) { btn.className = 'bet-btn off'; btn.textContent = '최소 10P 이상'; return; }
  if (amt > myPt) { btn.className = 'bet-btn off'; btn.textContent = '포인트 부족'; return; }
  const lbl = picked === 'rabbit' ? '🐇 토끼' : '🐢 거북이';
  const exp = Math.floor(amt * ODDS);
  btn.className = 'bet-btn';
  btn.textContent = `${lbl} · ${fmt(amt)}P → 예상 +${fmt(exp)}P`;
}

async function startRace() {
  if (racing || !picked) return;
  const amt = parseInt(document.getElementById('amt').value) || 0;
  if (amt < 10 || amt > myPt) return;

  document.getElementById('bet-panel').style.opacity = '0.4';
  document.getElementById('bet-panel').style.pointerEvents = 'none';
  document.getElementById('track-status').textContent = '🏃 경주 중!';
  document.getElementById('racing-status').textContent = '⚡ RACE STARTED!';
  refreshBtn();

  try {
    // 서버에 베팅 전송 → 서버가 결과 결정
    const res = await fetch('/casino/race/instant', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({groupId:parseInt(groupId), userId:parseInt(userId), betOn:picked, amount:amt})
    });
    const data = await res.json();
    if (!data.ok) {
      toast(data.error||'오류', true);
      document.getElementById('bet-panel').style.opacity = '1';
      document.getElementById('bet-panel').style.pointerEvents = '';
      refreshBtn(); return;
    }

    const winner = data.winner;   // 서버가 결정한 승자
    const payout = data.payout;   // 서버가 계산한 지급액

    // 포인트 서버 기준 동기화
    myPt = myPt - amt + (payout||0);
    setPoint(groupId, userId, myPt);
    document.getElementById('my-point').textContent = fmt(myPt) + ' P';

    animRace(winner, () => {
      const won = picked === winner;
      history.unshift(winner);
      if (history.length > 20) history.pop();
      renderHistory();

      const winLabel = winner === 'rabbit' ? '🐇 토끼 우승!' : '🐢 거북이 우승!';
      document.getElementById('ov-emoji').textContent = won ? '🏆' : '💸';
      document.getElementById('ov-title').textContent = winLabel;
      if (won) {
        document.getElementById('ov-sub').textContent = '🎉 베팅 성공!';
        document.getElementById('ov-payout').textContent = `+${fmt(payout)} P 획득!`;
        document.getElementById('ov-payout').style.color = '#44ee88';
        vibrate([100,50,200]);
      } else {
        document.getElementById('ov-sub').textContent = '아쉬워요. 다음 기회에!';
        document.getElementById('ov-payout').textContent = `-${fmt(amt)} P`;
        document.getElementById('ov-payout').style.color = '#ee4444';
        vibrate([200]);
      }
      document.getElementById('overlay').classList.add('show');
    });
  } catch(e) {
    toast('서버 오류', true);
    document.getElementById('bet-panel').style.opacity = '1';
    document.getElementById('bet-panel').style.pointerEvents = '';
    refreshBtn();
  }
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('bet-panel').style.opacity = '1';
  document.getElementById('bet-panel').style.pointerEvents = '';
  document.getElementById('track-status').textContent = '베팅 후 START!';
  document.getElementById('racing-status').textContent = '';
  resetRacers();
  picked = null;
  document.getElementById('opt-r').className = 'bet-opt';
  document.getElementById('opt-t').className = 'bet-opt';
  document.getElementById('amt').value = '';
  refreshBtn();
}

function renderHistory() {
  const el = document.getElementById('history-dots');
  if (!history.length) { el.innerHTML = '<div style="font-size:11px;color:var(--sub)">기록 없음</div>'; return; }
  el.innerHTML = history.slice(0, 20).map(h =>
    `<div class="hdot" style="background:${h==='rabbit'?'rgba(74,158,255,0.2)':'rgba(68,204,136,0.2)'};border:1px solid ${h==='rabbit'?'var(--rabbit)':'var(--turtle)'};color:${h==='rabbit'?'var(--rabbit)':'var(--turtle)'}">
      ${h==='rabbit'?'🐇':'🐢'}
    </div>`
  ).join('');
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }
